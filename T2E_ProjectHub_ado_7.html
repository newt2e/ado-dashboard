<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T2E Project Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav:#0f172a;--nav-text:#94a3b8;--nav-active:#f1f5f9;--nav-accent:#3b82f6;
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --red:#ef4444;--red-bg:#fef2f2;--red-t:#b91c1c;
  --amber:#f59e0b;--amber-bg:#fffbeb;--amber-t:#92400e;
  --green:#10b981;--green-bg:#f0fdf4;--green-t:#065f46;
  --blue:#3b82f6;--blue-bg:#eff6ff;--blue-t:#1e40af;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;height:100%}
button{cursor:pointer;font-family:inherit}
select,input,textarea{font-family:inherit}

/* ── APP SHELL ── */
.app{display:flex;min-height:100vh}

/* ── NAV ── */
.nav{width:220px;min-width:220px;background:var(--nav);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.nav-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo h1{font-size:13px;font-weight:600;color:#f1f5f9;letter-spacing:.02em}
.nav-logo p{font-size:11px;color:var(--nav-text);margin-top:2px}
.nav-section{padding:16px 8px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;color:#475569;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:6px;margin:1px 8px;color:var(--nav-text);font-size:13px;font-weight:400;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--nav-active);font-weight:500}
.nav-item .icon{font-size:15px;opacity:.8}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:600;padding:1px 6px}
.nav-badge.amb{background:var(--amber)}
.nav-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid rgba(255,255,255,.06)}
.sync-info{font-size:10px;color:#475569;padding:4px 8px;line-height:1.4}

/* ── MAIN ── */
.main{flex:1;padding:24px 28px;overflow-y:auto;min-width:0}
.page-header{margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:600;color:var(--text)}
.page-header p{font-size:13px;color:var(--text2);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}

/* ── METRIC GRID ── */
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.mc-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mc-val{font-size:26px;font-weight:600;line-height:1}
.mc-sub{font-size:11px;color:var(--text3);margin-top:4px}
.mc.danger{border-color:#fecaca;background:#fef2f2}.mc.danger .mc-val{color:var(--red-t)}
.mc.warn{border-color:#fde68a;background:#fffbeb}.mc.warn .mc-val{color:var(--amber-t)}
.mc.good{border-color:#a7f3d0;background:#f0fdf4}.mc.good .mc-val{color:var(--green-t)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
.badge-red{background:var(--red-bg);color:var(--red-t)}
.badge-amber{background:var(--amber-bg);color:var(--amber-t)}
.badge-green{background:var(--green-bg);color:var(--green-t)}
.badge-blue{background:var(--blue-bg);color:var(--blue-t)}
.badge-gray{background:var(--surface2);color:var(--text2)}

/* ── PROGRESS ── */
.prog-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── ITEM LIST ── */
.item-list{display:flex;flex-direction:column;gap:2px}
.item-row{display:grid;align-items:center;padding:8px 10px;border-radius:6px;gap:10px;transition:background .12s;cursor:default;grid-template-columns:44px 1fr 70px 90px 120px}
.item-row:hover{background:var(--surface2)}
.item-row.overdue{border-left:3px solid var(--red);padding-left:8px}
.item-row.thisweek{border-left:3px solid var(--amber);padding-left:8px}
.iid{font-family:var(--mono);font-size:10px;color:var(--text3)}
.ititle{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iowner{font-size:11px;color:var(--text2)}
.idt{font-size:11px;font-family:var(--mono)}
.idt.red{color:var(--red-t);font-weight:500}
.idt.amb{color:var(--amber-t);font-weight:500}

/* ── WS CARDS ── */
.ws-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.ws-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;transition:border-color .15s}
.ws-card:hover{border-color:var(--border2)}
.ws-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-sub{font-size:11px;color:var(--text2);margin-bottom:8px}
.ws-counts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ws-expand{background:none;border:none;font-size:11px;color:var(--blue);margin-top:6px;padding:0;cursor:pointer}
.ws-items{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--nav);color:#f1f5f9;border-color:var(--nav)}
.btn-primary:hover{background:#1e293b}
.btn-danger{background:var(--red-bg);color:var(--red-t);border-color:#fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-bg);color:var(--green-t);border-color:#a7f3d0}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{padding:5px 8px;border-radius:6px}

/* ── INPUTS ── */
.inp{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:12px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:var(--blue)}
.inp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── MISC ── */
.section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sep{height:1px;background:var(--border);margin:16px 0}
.scroll-area{max-height:360px;overflow-y:auto;padding-right:2px}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.state-sel{padding:3px 6px;border:1px solid var(--border2);border-radius:6px;font-size:11px;background:var(--surface);color:var(--text)}
.call-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px}
.alert-red{background:var(--red-bg);color:var(--red-t);border:1px solid #fecaca}
.alert-green{background:var(--green-bg);color:var(--green-t);border:1px solid #a7f3d0}
.alert-amber{background:var(--amber-bg);color:var(--amber-t);border:1px solid #fde68a}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.action-item.done{opacity:.5}
.action-item.done .ai-title{text-decoration:line-through}
.meeting-header{background:var(--nav);color:#f1f5f9;border-radius:var(--rl);padding:16px 18px;margin-bottom:16px}
.meeting-header h3{font-size:15px;font-weight:600;margin-bottom:2px}
.meeting-header p{font-size:12px;color:#94a3b8}

/* ── GANTT ── */
.gantt-outer{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--surface)}
.gantt-inner{min-width:960px}
.gantt-hdr{display:flex;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:12;background:var(--surface)}
.gantt-lc{padding:0 12px;display:flex;align-items:center;font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);border-right:1px solid var(--border);position:sticky;left:0;z-index:13;letter-spacing:.07em;text-transform:uppercase;height:34px;flex-shrink:0}
.gantt-tc{flex:1;position:relative;height:34px}
.row-feat{min-height:38px;display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;cursor:pointer}
.row-feat:hover{background:#f1f5f9}
.row-story{min-height:30px;display:flex;border-bottom:1px solid #f1f5f9}
.row-story:hover{background:var(--surface2)}
.row-task{min-height:24px;display:flex;border-bottom:1px solid #f8f9fa;background:#fafbfd}
.row-task:hover{background:var(--surface2)}
.name-cell{padding:0 10px;display:flex;align-items:center;gap:7px;position:sticky;left:0;border-right:1px solid var(--border);z-index:2;flex-shrink:0}
.time-cell{flex:1;position:relative;min-height:inherit}
.gantt-footer{display:flex;border-top:2px solid var(--border);background:#f0fdf4;min-height:28px}

/* ── FILTER PILLS ── */
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:7px 0 9px;border-bottom:1px solid var(--border);margin-bottom:8px}

@media(max-width:1100px){.metric-grid,.ws-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="nav-logo">
    <h1>T2E Project Hub</h1>
    <p>New Time2Eat Migration</p>
  </div>
  <div class="nav-section">Navigation</div>
  <button class="nav-item active" id="nv-overview" onclick="setTab('overview')"><span class="icon">📊</span>Overview</button>
  <button class="nav-item" id="nv-weekly" onclick="setTab('weekly')"><span class="icon">📅</span>Weekly Call<span class="nav-badge" id="nb-weekly" style="display:none">0</span></button>
  <button class="nav-item" id="nv-actions" onclick="setTab('actions')"><span class="icon">✅</span>Action Items<span class="nav-badge amb" id="nb-actions" style="display:none">0</span></button>
  <button class="nav-item" id="nv-all" onclick="setTab('all')"><span class="icon">📋</span>All Items</button>
  <button class="nav-item" id="nv-sync" onclick="setTab('sync')"><span class="icon">🔄</span>Sync</button>
  <div class="nav-section" style="margin-top:8px">Team</div>
  <div id="nav-team"></div>
  <div class="nav-bottom">
    <div class="sync-info" id="sync-info">Not connected<br>BP Go-Live: Aug 2026</div>
    <button class="nav-item" id="nav-quick-sync" style="margin-top:4px" onclick="quickSync()">
      <span class="icon" id="nav-sync-icon">↻</span>
      <span id="nav-sync-label">Connect ADO</span>
    </button>
  </div>
</nav>

<!-- MAIN -->
<main class="main" id="main-content">
  <div class="empty-state">Loading…</div>
</main>
</div>

<script>
// WS metadata — used as fallback display names; overwritten dynamically from ADO data
const WS_META = {};
const WS_COLORS = {WS1:"#3b82f6",WS2:"#0d9488",WS3:"#8b5cf6",WS4:"#f59e0b",WS5:"#ec4899",WS6:"#10b981",WS7:"#6b7280",WS8:"#ef4444",WS9:"#8b5cf6"};
const OWNER_META = {
  Abhijeet:{color:"#3b82f6",role:"Engineering Lead"},
  Arun:    {color:"#7c3aed",role:"Data Engineer"},
  Anthony: {color:"#0d9488",role:"D&T, Compass Group"},
  Bhaskar: {color:"#d97706",role:"Training Content"},
  Dakshath:{color:"#dc2626",role:"Implementation Eng."},
  Joanna:  {color:"#db2777",role:"Comms, Compass Group"},
  Manoj:   {color:"#4f46e5",role:"Release Planning"},
  Nishant: {color:"#0891b2",role:"Success Criteria"},
  Nithin:  {color:"#0f172a",role:"VP – Global Partnerships"},
  Piyush:  {color:"#65a30d",role:"QA Engineering"},
  Priya:   {color:"#ea580c",role:"Training Content"},
  Rajesh:  {color:"#0369a1",role:"Implementation Eng."},
  Sydon:   {color:"#9333ea",role:"Demo Environments"},
  Zakki:   {color:"#475569",role:"Communications"},
};
const STATES = ["In Progress","Active","Yet to Start","New","Closed"];
const GO_LIVE = new Date("2026-08-01");
const TL_START = new Date("2026-04-01");
const TL_END   = new Date("2026-10-31");
const TL_MS    = TL_END - TL_START;
// ── STATE ──
let G = {
  items: [],
  overrides: {},
  meetings: [],
  lastSync: null,
  syncing: false,
  syncError: null,
  connected: false,
  // ADO connection config — persisted in storage
  adoCfg: { orgUrl:"https://dev.azure.com/SmartQ-Global-Digital-Cafeteria-Suite", project:"Gartner - SQ Transformation", pat:"", epicId:5276 },
  tab: "overview",
  expandedWS: {},
  expandedStory: {},
  callPhase: "home",
  activeMeeting: null,
  callNotes: "",
  callAttendees: "",
  ragOverride: {},
  localOverrides: {},
  newAI: {text:"",owner:"",due:""},
  allSort: {col:"target",dir:1},
  ownerPageShowDone: {},
  ganttFilter: {state:[], owner:[], type:[]},
};

function ownerMeta(n){ return OWNER_META[n] || {color:"#6b7280",role:"Team member"}; }
function ownerColor(n){ return ownerMeta(n).color; }
function ownerInit(n){ return (n||"?").slice(0,2).toUpperCase(); }

function dl(tgt){ return tgt ? Math.round((new Date(tgt)-new Date())/86400000) : null; }
function urgency(it){
  if(it.state==="Closed") return "done";
  const d=dl(it.target);
  if(d===null) return "later";
  if(d<0) return "overdue";
  if(d<=7) return "thisweek";
  if(d<=14) return "nextweek";
  return "later";
}
function fmtDate(s){
  if(!s) return "—";
  const d=new Date(s);
  return `${d.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]}`;
}
function fmtDateFull(s){
  if(!s) return "";
  return new Date(s).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});
}
function genId(){ return Math.random().toString(36).slice(2,9); }

function effectiveItems(){
  return G.items.map(it => G.overrides[it.id] ? {...it,state:G.overrides[it.id]} : it);
}

function tlPct(dateStr){
  if(!dateStr) return 0;
  return Math.max(0,Math.min(100,(new Date(dateStr)-TL_START)/TL_MS*100));
}
function tlW(s,e){
  if(!s||!e) return 0.4;
  const ms=Math.max(new Date(s),TL_START);
  const me=Math.min(new Date(e),TL_END);
  return Math.max(0.4,(me-ms)/TL_MS*100);
}
function barColor(it){
  if(it.state==="Closed") return "#10b981";
  const u=urgency(it);
  if(u==="overdue") return "#ef4444";
  if(u==="thisweek") return "#f59e0b";
  if(it.state==="In Progress"||it.state==="Active") return "#3b82f6";
  return "#cbd5e1";
}
function barOpacity(it){ return (it.state==="Yet to Start"||it.state==="New") ? 0.65 : 1; }

function stateBadge(state){
  const map={"Closed":"badge-green","In Progress":"badge-blue","Active":"badge-blue","Yet to Start":"badge-gray","New":"badge-gray"};
  return `<span class="badge ${map[state]||'badge-gray'}">${state}</span>`;
}

function stateSelect(id, state, onChange){
  return `<select class="state-sel" onchange="${onChange}(${id},this.value)">${STATES.map(s=>`<option${s===state?" selected":""}>${s}</option>`).join("")}</select>`;
}

// ── STORAGE ──
async function storageGet(k){ try{ const r=await window.storage.get(k); return r?r.value:null; }catch(e){return null;} }
async function storageSet(k,v){ try{ await window.storage.set(k,v); }catch(e){} }
async function storageDel(k){ try{ await window.storage.delete(k); }catch(e){} }

async function loadStorage(){
  const [ir,sr,or_,mr,cr] = await Promise.all([
    storageGet("t2e_items"),storageGet("t2e_sync"),storageGet("t2e_overrides"),
    storageGet("t2e_meetings"),storageGet("t2e_ado_cfg")
  ]);
  if(ir){ G.items=JSON.parse(ir); G.connected=true; }
  if(sr) G.lastSync=sr;
  if(or_) G.overrides=JSON.parse(or_);
  if(mr) G.meetings=JSON.parse(mr);
  if(cr) G.adoCfg=JSON.parse(cr);
}

async function saveOverrides(){
  await storageSet("t2e_overrides", JSON.stringify(G.overrides));
}

// ── NAV ──
function setTab(tab, extra){
  G.tab = tab;
  document.querySelectorAll(".nav-item").forEach(el=>{
    const id = el.id;
    if(id) el.classList.toggle("active", id==="nv-"+tab || (tab.startsWith("owner-") && id==="nv-owner-"+tab.replace("owner-","")));
  });
  // clear active on all owner navs if switching away
  document.querySelectorAll("[id^='nv-owner-']").forEach(el=>el.classList.remove("active"));
  if(tab.startsWith("owner-")){
    const el=document.getElementById("nv-owner-"+tab.replace("owner-",""));
    if(el) el.classList.add("active");
    ["nv-overview","nv-weekly","nv-actions","nv-all","nv-sync"].forEach(id=>{const e=document.getElementById(id);if(e)e.classList.remove("active");});
  } else {
    ["nv-overview","nv-weekly","nv-actions","nv-all","nv-sync"].forEach(id=>{
      const e=document.getElementById(id);
      if(e) e.classList.toggle("active", id==="nv-"+tab);
    });
  }
  render();
}

function buildNav(){
  const items = effectiveItems();
  const overdueN = items.filter(i=>urgency(i)==="overdue").length;
  const openAIs  = G.meetings.flatMap(m=>(m.actionItems||[]).filter(a=>!a.done)).length;
  const nb = document.getElementById("nb-weekly");
  const na = document.getElementById("nb-actions");
  if(nb){ nb.textContent=overdueN; nb.style.display=overdueN>0?"":"none"; }
  if(na){ na.textContent=openAIs;  na.style.display=openAIs>0?"":"none"; }

  const ownerList = [...new Set(items.map(i=>i.owner))].sort((a,b)=>{
    const oa=items.filter(i=>i.owner===a&&urgency(i)==="overdue").length;
    const ob=items.filter(i=>i.owner===b&&urgency(i)==="overdue").length;
    return ob-oa||a.localeCompare(b);
  });

  const teamEl = document.getElementById("nav-team");
  teamEl.innerHTML = ownerList.map(owner=>{
    const color = ownerColor(owner);
    const od  = items.filter(i=>i.owner===owner&&urgency(i)==="overdue").length;
    const mine = items.filter(i=>i.owner===owner);
    const pct  = mine.length ? Math.round(mine.filter(i=>i.state==="Closed").length/mine.length*100) : 0;
    const isActive = G.tab==="owner-"+owner;
    return `<button class="nav-item${isActive?" active":""}" id="nv-owner-${owner}" onclick="setTab('owner-${owner}')">
      <span style="width:22px;height:22px;border-radius:6px;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700;flex-shrink:0">${ownerInit(owner)}</span>

// ── GANTT ──
function buildGanttMonths(){
  const out=[];
  let d=new Date(TL_START);
  while(d<=TL_END){
    out.push({label:d.toLocaleDateString("en-GB",{month:"short"}),yr:String(d.getFullYear()).slice(2),left:tlPct(d.toISOString().slice(0,10))});
    d=new Date(d.getFullYear(),d.getMonth()+1,1);
  }
  return out;
}

function buildHierarchy(items){
  // Build lookup maps from actual ADO parent-child relationships
  const byId = new Map(items.map(i=>[i.id, i]));

  // Map each Feature (level 2) to its WS bucket
  const featureToWS = new Map();
  const wsMap = new Map(); // ws key -> {ws, feature, stories:[]}

  items.filter(i=>i.level===2).forEach(feat=>{
    featureToWS.set(feat.id, feat.ws);
    if(!wsMap.has(feat.ws)){
      wsMap.set(feat.ws, {ws:feat.ws, feature:feat, stories:[]});
    }
  });

  // Map each Story (level 3) to its story bucket, keyed by id
  const storyMap = new Map(); // story id -> {story, tasks:[]}

  items.filter(i=>i.level===3).forEach(story=>{
    const bucket = {story, tasks:[]};
    storyMap.set(story.id, bucket);
    // Find which WS feature is the ancestor
    const parentFeature = byId.get(story.parentId);
    const wsKey = parentFeature ? parentFeature.ws : story.ws;
    const wsBucket = wsMap.get(wsKey);
    if(wsBucket) wsBucket.stories.push(bucket);
  });

  // Assign Tasks (level 4) to their parent story
  items.filter(i=>i.level===4).forEach(task=>{
    // Direct parent may be story or feature
    const parentStory = storyMap.get(task.parentId);
    if(parentStory){
      parentStory.tasks.push(task);
    } else {
      // Task parented directly under a feature — create a virtual story wrapper
      const parentFeat = byId.get(task.parentId);
      if(parentFeat && parentFeat.level===2){
        const wsKey = parentFeat.ws;
        const wsBucket = wsMap.get(wsKey);
        if(wsBucket){
          // Find or create a "direct tasks" virtual story per feature
          const virtualId = `virtual-${task.parentId}`;
          let vBucket = storyMap.get(virtualId);
          if(!vBucket){
            vBucket = {story:{...parentFeat, id:virtualId, title:'(Direct Tasks)', level:3, _virtual:true}, tasks:[]};
            storyMap.set(virtualId, vBucket);
            wsBucket.stories.push(vBucket);
          }
          vBucket.tasks.push(task);
        }
      }
    }
  });

  // Return WS buckets in WS key order, with stories/tasks sorted by id
  const wss = [...wsMap.values()].sort((a,b)=>a.ws.localeCompare(b.ws));
  wss.forEach(ws=>{
    ws.stories.sort((a,b)=>{
      if(a.story._virtual) return 1;
      if(b.story._virtual) return -1;
      return a.story.id - b.story.id;
    });
    ws.stories.forEach(s=>s.tasks.sort((a,b)=>a.id-b.id));
  });
  return wss;
}

          color:${isActive?"var(--blue-t)":"var(--text)"};font-size:12px;font-weight:${isActive?600:400};
          cursor:pointer;white-space:nowrap;min-width:120px;justify-content:space-between">
        <span>${btnLabel}</span>
        <span style="font-size:9px;opacity:.6">▼</span>
      </button>
      <div id="${dropId}-panel" class="gd-panel"
        style="display:none;position:absolute;top:calc(100% + 4px);left:0;z-index:200;
          background:var(--surface);border:1px solid var(--border2);border-radius:8px;
          box-shadow:0 4px 16px rgba(0,0,0,.12);padding:4px 0;min-width:160px;max-height:240px;overflow-y:auto">
        ${checkboxes}
      </div>
    </div>`;
  }

  html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px">
    <div class="section-title" style="margin:0">Project Timeline</div>
    <div style="display:flex;gap:14px;font-size:11px;color:var(--text2);flex-wrap:wrap">
      ${[["#10b981","Closed"],["#3b82f6","In Progress"],["#f59e0b","Due Soon"],["#ef4444","Overdue"],["#cbd5e1","Not Started"]].map(([c,l])=>`<span style="display:flex;align-items:center;gap:5px"><span style="width:10px;height:10px;border-radius:2px;background:${c};display:inline-block"></span>${l}</span>`).join("")}
    </div>
  </div>
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    ${msDropdown("state","State",STATES)}
    ${msDropdown("owner","Assigned To",ganttOwners)}
    ${msDropdown("type","Type",ganttTypes)}
    ${hasFilter?`<button onclick="ganttFilterClear()" style="padding:5px 10px;font-size:11px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:6px;cursor:pointer;white-space:nowrap">Clear all</button>
    <span style="font-size:11px;color:var(--text3)">${ganttItems.length} of ${items.length} shown</span>`:""}
  </div>
  <script>
    document.addEventListener('click', function(e){
      if(!e.target.closest('.gd-panel') && !e.target.closest('[id$="-btn"]')){
        document.querySelectorAll('.gd-panel').forEach(function(x){x.style.display='none';});
      }
    });
  <\/script>
  ${ganttHTML(ganttItems)}`;

  // Workstream Health
  html += `<div class="card" style="margin-top:16px;margin-bottom:16px">
    <div class="section-title" style="margin-top:0">Workstream Health</div>
    <div class="ws-grid">
      ${wsStats.map(ws=>`<div class="ws-card">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="width:8px;height:8px;border-radius:2px;background:${WS_COLORS[ws.ws]};flex-shrink:0"></span>
          <div class="ws-name">${ws.name}</div>
        </div>
        <div class="ws-sub">${ws.owner} · ${ws.total} items</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${ws.pct}%;background:${WS_COLORS[ws.ws]}"></div></div>
        <div class="ws-counts">
          <span class="badge badge-green">${ws.closed} done</span>
          ${ws.inprog>0?`<span class="badge badge-blue">${ws.inprog} active</span>`:""}
          ${ws.overdue>0?`<span class="badge badge-red">${ws.overdue} overdue</span>`:""}
        </div>
        <button class="ws-expand" onclick="toggleWsCard('${ws.ws}')">${G.expandedWS["card_"+ws.ws]?"▲ hide items":"▼ show items"}</button>
        ${G.expandedWS["card_"+ws.ws]?`<div class="ws-items scroll-area"><div class="item-list">${ws.items.sort((a,b)=>{const o={"Closed":4,"In Progress":1,"Active":1,"Yet to Start":3,"New":3};return(o[a.state]||5)-(o[b.state]||5);}).map(it=>itemRowHTML(it)).join("")}</div></div>`:""}
      </div>`).join("")}
    </div>
  </div>`;

  // Overdue
  if(overdue.length>0){
    html += `<div class="card" style="margin-bottom:16px;border-color:#fecaca">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-title" style="margin-top:0;margin-bottom:0">
          <span style="color:var(--red)">●</span> Overdue Items — action required
          <span class="badge badge-red">${filteredOD.length}${filteredOD.length!==overdue.length?" of "+overdue.length:""}</span>
        </div>
      </div>
      ${filterBarHTML(overdue,F.od.owner,F.od.ws,F.od.q,"filterOD",true)}
      ${filteredOD.length===0?`<div class="empty-state" style="padding:12px 0">No items match the filter</div>`:`<div class="item-list">${filteredOD.map(it=>itemRowHTML(it,true)).join("")}</div>`}
    </div>`;
  }

  // Due this week
  html += `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-title" style="margin-top:0;margin-bottom:0">
        Due This Week
        <span class="badge badge-amber">${filteredTW.length}${filteredTW.length!==thisweek.length?" of "+thisweek.length:""}</span>
      </div>
    </div>
    ${thisweek.length===0?`<div class="empty-state">Nothing due this week 🎉</div>`:
      filterBarHTML(thisweek,F.tw.owner,F.tw.ws,F.tw.q,"filterTW",true)+
      (filteredTW.length===0?`<div class="empty-state" style="padding:12px 0">No items match</div>`:`<div class="item-list">${filteredTW.map(it=>itemRowHTML(it,true)).join("")}</div>`)}
  </div>`;

  return html;
}

// ── WEEKLY CALL ──
function renderWeekly(){
  const items = effectiveItems();
  const overdue  = items.filter(i=>urgency(i)==="overdue");
  const thisweek = items.filter(i=>urgency(i)==="thisweek");
  const active   = items.filter(i=>["In Progress","Active"].includes(i.state)&&urgency(i)!=="overdue");
  const attn = [...overdue,...thisweek];

  if(G.callPhase==="home"){
    const filteredHome = attn.filter(i=>
      (F.homeOwner==="All"||i.owner===F.homeOwner)&&
      (F.homeWS==="All"||i.ws===F.homeWS)&&
      (!F.homeQ||i.title.toLowerCase().includes(F.homeQ.toLowerCase()))
    ).sort((a,b)=>dl(a.target)-dl(b.target));

    return `<div class="page-header"><h2>Weekly Call</h2><p>Run your weekly project sync, update statuses, and capture action items</p></div>
    <div class="two-col" style="margin-bottom:20px">
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Start New Weekly Call</div>
        <div style="font-size:12px;color:var(--text2);margin-bottom:12px">
          Today: ${fmtDateFull(new Date().toISOString())} &nbsp;·&nbsp;
          ${overdue.length>0?`<span style="color:var(--red-t)">${overdue.length} overdue</span>`:""}
          ${overdue.length>0&&thisweek.length>0?" · ":""}
          ${thisweek.length>0?`<span style="color:var(--amber-t)">${thisweek.length} due this week</span>`:""}
        </div>
        <div class="inp-row">
          <input class="inp" placeholder="Attendees (e.g. Nithin, Anthony, Joanna…)" id="wc-attendees" value="${G.callAttendees}" oninput="G.callAttendees=this.value">
        </div>
        <button class="btn btn-primary" onclick="startMeeting()">▶ Start Meeting</button>
      </div>
      <div class="card">
        <div style="font-size:13px;font-weight:600;margin-bottom:8px">Previous Calls</div>
        ${G.meetings.length===0?`<div style="font-size:12px;color:var(--text3)">No calls recorded yet.</div>`:
          `<div class="scroll-area" style="max-height:140px">
            ${G.meetings.slice(0,5).map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)">
              <div>
                <div style="font-size:12px;font-weight:500">${fmtDateFull(m.date)}</div>
                <div style="font-size:11px;color:var(--text3)">${m.actionItems?.length||0} action items · ${m.attendees||"—"}</div>
              </div>
              <button class="btn btn-sm" onclick="viewMeeting('${m.id}')">View</button>
            </div>`).join("")}
          </div>`}
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-title" style="margin-top:0;margin-bottom:0">
          <span style="color:var(--red)">●</span> Items needing attention this week
          <span class="badge badge-red">${filteredHome.length}${filteredHome.length!==attn.length?" of "+attn.length:""}</span>
        </div>
      </div>
      ${attn.length===0?`<div class="empty-state">All clear this week</div>`:
        filterBarHTML(attn,F.homeOwner,F.homeWS,F.homeQ,"filterHome",true)+
        (filteredHome.length===0?`<div class="empty-state" style="padding:12px 0">No items match</div>`:`<div class="item-list">${filteredHome.map(it=>itemRowHTML(it,true)).join("")}</div>`)}
    </div>`;
  }

  if(G.callPhase==="new"){
    const callFilter = i=>(F.callOwner==="All"||i.owner===F.callOwner)&&(F.callWS==="All"||i.ws===F.callWS);
    const fOD  = overdue.filter(callFilter);
    const fTW  = thisweek.filter(callFilter);
    const fAct = active.filter(callFilter).slice(0,12);

    return `<div class="meeting-header">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div>
          <h3>Weekly Migration Sync — ${fmtDateFull(new Date().toISOString())}</h3>
          <p>${G.callAttendees||"Attendees not set"} · ${overdue.length+thisweek.length} items to review</p>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-sm" onclick="G.callPhase='home';render()">✕ Cancel</button>
          <button class="btn btn-success btn-sm" onclick="saveMeeting()">✓ Save & Close Meeting</button>
        </div>
      </div>
    </div>
    <div class="two-col">
      <div>
        ${filterBarHTML([...overdue,...thisweek,...active],F.callOwner,F.callWS,"","filterCall")}
        ${overdue.length>0?`<div class="section-title">🔴 Overdue — update status now</div>
          ${fOD.map(it=>`<div class="call-item">
            <div>
              <div style="font-size:12px;font-weight:500">${it.title}</div>
              <div style="font-size:11px;color:var(--text2)">#${it.id} · ${it.owner} · ${Math.abs(dl(it.target))}d overdue</div>
            </div>
            <div style="display:flex;gap:4px">${["🔴","🟡","🟢"].map((e,i)=>`<span style="cursor:pointer;font-size:16px;opacity:${G.ragOverride[it.id]===e?1:0.3}" onclick="setRAG(${it.id},'${e}')">${e}</span>`).join("")}</div>
            ${stateSelect(it.id, G.localOverrides[it.id]||G.overrides[it.id]||it.state, "callStateChange")}
          </div>`).join("")}`:""}
        ${thisweek.length>0?`<div class="section-title">🟡 Due this week</div>
          ${fTW.map(it=>`<div class="call-item">
            <div>
              <div style="font-size:12px;font-weight:500">${it.title}</div>
              <div style="font-size:11px;color:var(--text2)">#${it.id} · ${it.owner} · Due ${fmtDate(it.target)}</div>
            </div>
            <div style="display:flex;gap:4px">${["🔴","🟡","🟢"].map(e=>`<span style="cursor:pointer;font-size:16px;opacity:${G.ragOverride[it.id]===e?1:0.3}" onclick="setRAG(${it.id},'${e}')">${e}</span>`).join("")}</div>
            ${stateSelect(it.id, G.localOverrides[it.id]||G.overrides[it.id]||it.state, "callStateChange")}
          </div>`).join("")}`:""}
        ${active.length>0?`<div class="section-title">🔵 In Progress — quick check</div>
          ${fAct.map(it=>`<div class="call-item">
            <div>
              <div style="font-size:12px;font-weight:500">${it.title}</div>
              <div style="font-size:11px;color:var(--text2)">#${it.id} · ${it.owner} · Target ${fmtDate(it.target)}</div>
            </div>
            <div style="display:flex;gap:4px">${["🔴","🟡","🟢"].map(e=>`<span style="cursor:pointer;font-size:16px;opacity:${G.ragOverride[it.id]===e?1:0.3}" onclick="setRAG(${it.id},'${e}')">${e}</span>`).join("")}</div>
            ${stateSelect(it.id, G.localOverrides[it.id]||G.overrides[it.id]||it.state, "callStateChange")}
          </div>`).join("")}`:""}
      </div>
      <div>
        <div class="section-title">📝 Meeting Notes</div>
        <textarea class="inp" rows="5" placeholder="Key discussion points, decisions, risks, blockers…" style="resize:vertical;margin-bottom:12px" oninput="G.callNotes=this.value">${G.callNotes}</textarea>
        <div class="section-title">✅ Action Items</div>
        <div style="margin-bottom:8px">
          <input class="inp" placeholder="Action item…" id="ai-text" value="${G.newAI.text}" oninput="G.newAI.text=this.value" onkeydown="if(event.key==='Enter')addAI()" style="margin-bottom:6px">
          <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:6px">
            <input class="inp" placeholder="Owner" id="ai-owner" value="${G.newAI.owner}" oninput="G.newAI.owner=this.value">
            <input class="inp" type="date" id="ai-due" value="${G.newAI.due}" oninput="G.newAI.due=this.value">
            <button class="btn" onclick="addAI()">+ Add</button>
          </div>
        </div>
        ${(G.activeMeeting?.actionItems||[]).map(ai=>`<div class="action-item">
          <div style="flex:1">
            <div style="font-size:12px;font-weight:500">${ai.text}</div>
            <div style="font-size:11px;color:var(--text3)">${ai.owner||""}${ai.due?" · Due "+fmtDate(ai.due):""}</div>
          </div>
          <button class="btn btn-icon btn-sm" onclick="removeAI('${ai.id}')">✕</button>
        </div>`).join("")}
      </div>
    </div>`;
  }

  // view mode
  const m = G.activeMeeting;
  if(G.callPhase==="view"&&m) return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <h2 style="font-size:16px;font-weight:600">Meeting: ${fmtDateFull(m.date)}</h2>
        <p style="font-size:12px;color:var(--text2)">${m.attendees||"—"}</p>
      </div>
      <button class="btn" onclick="G.callPhase='home';render()">← Back</button>
    </div>
    <div class="two-col">
      <div class="card">
        <div style="font-weight:600;margin-bottom:8px">Meeting Notes</div>
        <p style="font-size:12px;color:var(--text2);white-space:pre-wrap">${m.notes||"No notes recorded."}</p>
        ${Object.keys(m.statusUpdates||{}).length>0?`<div style="font-weight:600;margin-top:12px;margin-bottom:6px">Status Updates</div>
          ${Object.entries(m.statusUpdates).map(([id,state])=>{const it=G.items.find(i=>i.id===parseInt(id));return it?`<div style="font-size:11px;color:var(--text2);margin-bottom:3px"><span style="font-family:var(--mono)">#${id}</span> ${it.title} → ${stateBadge(state)}</div>`:""}).join("")}`:""}
      </div>
      <div class="card">
        <div style="font-weight:600;margin-bottom:8px">Action Items (${m.actionItems?.length||0})</div>
        ${(m.actionItems||[]).length===0?`<div style="font-size:12px;color:var(--text3)">No action items.</div>`:
          (m.actionItems||[]).map(ai=>`<div class="action-item"><div style="flex:1"><div style="font-size:12px;font-weight:500">${ai.text}</div><div style="font-size:11px;color:var(--text3)">${ai.owner||""}${ai.due?" · Due "+fmtDate(ai.due):""}</div></div></div>`).join("")}
      </div>
    </div>`;
  return "";
}

function startMeeting(){
  G.activeMeeting = {id:genId(),date:new Date().toISOString(),attendees:G.callAttendees,notes:"",actionItems:[],statusUpdates:{},ragStatus:{}};
  G.callNotes=""; G.localOverrides={}; G.ragOverride={}; G.callPhase="new"; render();
}
async function saveMeeting(){
  const m = {...G.activeMeeting,notes:G.callNotes,statusUpdates:G.localOverrides,ragStatus:G.ragOverride,attendees:G.callAttendees};
  G.meetings = [m,...G.meetings];
  G.overrides = {...G.overrides,...G.localOverrides};
  await saveOverrides();
  await storageSet("t2e_meetings",JSON.stringify(G.meetings));
  G.callPhase="view"; G.activeMeeting=m; render();
}
function viewMeeting(id){ G.activeMeeting=G.meetings.find(m=>m.id===id); G.callPhase="view"; render(); }
function setRAG(id,e){ G.ragOverride={...G.ragOverride,[id]:e}; render(); }
function callStateChange(id,state){ G.localOverrides={...G.localOverrides,[id]:state}; render(); }
function addAI(){
  if(!G.newAI.text.trim()) return;
  const ai={id:genId(),text:G.newAI.text,owner:G.newAI.owner,due:G.newAI.due,done:false,meetingId:G.activeMeeting?.id};
  G.activeMeeting={...G.activeMeeting,actionItems:[...(G.activeMeeting?.actionItems||[]),ai]};
  G.newAI={text:"",owner:"",due:""}; render();
}
function removeAI(aiId){ G.activeMeeting={...G.activeMeeting,actionItems:G.activeMeeting.actionItems.filter(a=>a.id!==aiId)}; render(); }
window.callStateChange=callStateChange; window.setRAG=setRAG;

// ── ACTION ITEMS ──
function renderActions(){
  const allAIs = G.meetings.flatMap(m=>(m.actionItems||[]).map(ai=>({...ai,meetingDate:m.date})));
  const open = allAIs.filter(a=>!a.done);
  const done = allAIs.filter(a=>a.done);
  return `<div class="page-header"><h2>Action Items</h2><p>${open.length} open · ${done.length} completed</p></div>
    ${allAIs.length===0?`<div class="empty-state">No action items yet. Start a weekly call to capture them.</div>`:""}
    ${open.length>0?`<div class="section-title">Open</div>
      ${open.sort((a,b)=>(a.due||"z")<(b.due||"z")?-1:1).map(ai=>`<div class="action-item">
        <input type="checkbox" onchange="toggleAI('${ai.id}','${ai.meetingId}')" style="margin-top:2px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:500">${ai.text}</div>
          <div style="font-size:11px;color:var(--text3)">
            ${ai.owner?`<span class="chip" style="margin-right:6px">${ai.owner}</span>`:""}
            ${ai.due?`<span class="chip">${fmtDate(ai.due)}</span>`:""}
            <span style="margin-left:8px">from ${fmtDateFull(ai.meetingDate)}</span>
          </div>
        </div>
      </div>`).join("")}`:""}
    ${done.length>0?`<div class="section-title">Completed</div>
      ${done.map(ai=>`<div class="action-item done">
        <input type="checkbox" checked onchange="toggleAI('${ai.id}','${ai.meetingId}')" style="margin-top:2px">
        <div style="flex:1"><div class="ai-title" style="font-size:13px">${ai.text}</div><div style="font-size:11px;color:var(--text3)">${ai.owner||""}</div></div>
      </div>`).join("")}`:""}`;
}
async function toggleAI(aiId,meetId){
  G.meetings = G.meetings.map(m=>m.id===meetId?{...m,actionItems:m.actionItems.map(a=>a.id===aiId?{...a,done:!a.done}:a)}:m);
  await storageSet("t2e_meetings",JSON.stringify(G.meetings));
  render();
}
window.toggleAI=toggleAI;

// ── ALL ITEMS ──
function renderAll(){
  const items = effectiveItems();
  let filtered = items.filter(i=>{
    const qm=!F.allQ||i.title.toLowerCase().includes(F.allQ.toLowerCase())||i.owner.toLowerCase().includes(F.allQ.toLowerCase())||String(i.id).includes(F.allQ);
    const wm=F.allWS==="All"||i.ws===F.allWS;
    const sm=F.allState==="All"||i.state===F.allState;
    const om=F.allOwner==="All"||i.owner===F.allOwner;
    return qm&&wm&&sm&&om;
  });
  const s=G.allSort;
  filtered.sort((a,b)=>{
    let va=a[s.col],vb=b[s.col];
    if(s.col==="target"){va=new Date(va);vb=new Date(vb);}
    if(va<vb) return -s.dir;
    if(va>vb) return s.dir;
    return 0;
  });
  const owners=[...new Set(items.map(i=>i.owner))].sort();
  const Th=(col,lbl)=>`<th onclick="sortAll('${col}')">${lbl}${s.col===col?(s.dir>0?" ↑":" ↓"):""}</th>`;

  return `<div class="page-header"><h2>All Items</h2><p>${filtered.length} of ${items.length} items</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <input class="inp" placeholder="Search…" value="${F.allQ}" oninput="filterAll('q',this.value)" style="width:200px">
      <select class="inp" onchange="filterAll('ws',this.value)" style="width:180px">
        <option value="All"${F.allWS==="All"?" selected":""}>All workstreams</option>
        ${Object.entries(WS_META).map(([k,v])=>`<option value="${k}"${F.allWS===k?" selected":""}>${k}: ${v.name}</option>`).join("")}
      </select>
      <select class="inp" onchange="filterAll('state',this.value)" style="width:150px">
        <option value="All"${F.allState==="All"?" selected":""}>All states</option>
        ${STATES.map(st=>`<option${F.allState===st?" selected":""}>${st}</option>`).join("")}
      </select>
      <select class="inp" onchange="filterAll('owner',this.value)" style="width:130px">
        <option value="All"${F.allOwner==="All"?" selected":""}>All owners</option>
        ${owners.map(o=>`<option${F.allOwner===o?" selected":""}>${o}</option>`).join("")}
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        ${Th("id","#")}${Th("ws","WS")}${Th("title","Title")}${Th("owner","Owner")}
        <th>State</th>${Th("target","Target")}<th>Urgency</th>
      </tr></thead>
      <tbody>
        ${filtered.map(it=>{
          const u=urgency(it),d=dl(it.target);
          const dtLabel=it.state==="Closed"?fmtDate(it.target):u==="overdue"?`${Math.abs(d)}d overdue`:fmtDate(it.target);
          return `<tr style="background:${u==="overdue"?"#fff5f5":""}">
            <td style="font-family:var(--mono);font-size:10px;color:var(--text3)">#${it.id}</td>
            <td><span class="badge badge-gray" style="font-size:9px">${it.ws}</span></td>

// ── ADO FETCH HELPERS ──
function adoAuth(pat){ try{ return 'Basic ' + btoa(unescape(encodeURIComponent(':' + pat))); }catch(e){ return 'Basic ' + btoa(':' + pat); } }

async function adoFetch(url, pat){
  const r = await fetch(url, {headers:{Authorization: adoAuth(pat)}});
  if(!r.ok) throw new Error(r.status + ': ' + (await r.text()).slice(0,150));
  return r.json();
}
async function adoPost(url, pat, body){
  const r = await fetch(url, {method:'POST', headers:{Authorization: adoAuth(pat),'Content-Type':'application/json'}, body:JSON.stringify(body)});
  if(!r.ok) throw new Error(r.status + ': ' + (await r.text()).slice(0,150));
  return r.json();
}

// ── STATE NORMALISATION ──
function normaliseState(raw){
  const s = (raw||'').toLowerCase().trim();
  if(['closed','done','resolved','completed'].includes(s)) return 'Closed';
  if(['active','in progress','in-progress','committed','doing'].includes(s)) return 'In Progress';
  if(['yet to start','to do','not started'].includes(s)) return 'Yet to Start';
  if(['new','proposed','approved'].includes(s)) return 'New';
  return raw || 'New';
}

// ── MAP ADO ITEMS → UI SHAPE ──
// Assigns WS1-WS9 to Features (direct children of root epic) in id order,
// then inherits WS down to stories and tasks via parent chain.
function mapAdoItems(rawItems, rootEpicId){
  const byId = new Map(rawItems.map(i=>[i.id,i]));

  // Find direct Feature children of root epic, assign WS1…WS9 in id order
  const features = rawItems
    .filter(i=>i.fields['System.Parent']===rootEpicId && i.fields['System.WorkItemType']==='Feature')
    .sort((a,b)=>a.id-b.id);
  const wsKeys = ['WS1','WS2','WS3','WS4','WS5','WS6','WS7','WS8','WS9'];
  const featureWs = new Map(features.map((f,idx)=>[f.id, wsKeys[idx] ?? `WS${idx+1}`]));

  // Walk up to find WS from Feature ancestor
  function resolveWs(item){
    if(featureWs.has(item.id)) return featureWs.get(item.id);
    const pid = item.fields['System.Parent'];
    if(!pid) return 'WS1';
    if(featureWs.has(pid)) return featureWs.get(pid);
    const parent = byId.get(pid);
    return parent ? resolveWs(parent) : 'WS1';
  }

  // Level from WorkItemType
  const typeLevel = {'Feature':2,'User Story':3,'Story':3,'Task':4,'Bug':4,'Test Case':4};

  const mapped = [];
  for(const item of rawItems){
    if(item.id === rootEpicId) continue; // skip root epic row itself
    const f = item.fields;
    const target = f['Microsoft.VSTS.Scheduling.FinishDate'] || f['Microsoft.VSTS.Scheduling.TargetDate'] || '';
    const owner = (f['System.AssignedTo']?.displayName || 'Unassigned').split(' ')[0];
    mapped.push({
      id:       item.id,
      title:    f['System.Title'] || '(no title)',
      state:    normaliseState(f['System.State']),
      owner,
      start:    (f['Microsoft.VSTS.Scheduling.StartDate']||'').slice(0,10),
      target:   target.slice(0,10),
      ws:       featureWs.get(item.id) || resolveWs(item),
      level:    typeLevel[f['System.WorkItemType']] ?? 3,
      type:     f['System.WorkItemType'] || 'Task',
      parentId: f['System.Parent'] || null,
    });
  }
  // Sort: features first (by ws index), then children sorted by parent ws then level then id
  const wsOrder = new Map(wsKeys.map((k,i)=>[k,i]));
  return mapped.sort((a,b)=>{
    const wa = wsOrder.get(a.ws) ?? 99;
    const wb = wsOrder.get(b.ws) ?? 99;
    return wa - wb || a.level - b.level || a.id - b.id;
  });
}

// ── BUILD DYNAMIC WS_META FROM MAPPED ITEMS ──
function rebuildWsMeta(items){
  for(const it of items){
    if(it.level===2 && !WS_META[it.ws]){
      WS_META[it.ws] = {name: it.title, owner: it.owner};
    }
  }
  // Also fill colour slots for any new WS keys
  const palette = ['#3b82f6','#0d9488','#8b5cf6','#f59e0b','#ec4899','#10b981','#6b7280','#ef4444','#a855f7'];
  Object.keys(WS_META).forEach((ws,i)=>{ if(!WS_COLORS[ws]) WS_COLORS[ws]=palette[i%palette.length]; });
}

async function doConnect(){
  const org  = document.getElementById('ado-org')?.value.trim()  || '';
  const proj = document.getElementById('ado-proj')?.value.trim() || '';
  const pat  = document.getElementById('ado-pat')?.value.trim()  || '';
  const epic = parseInt(document.getElementById('ado-epic')?.value||'5276',10)||5276;
  if(!org||!proj||!pat){ G.syncError='Please fill in all fields.'; render(); return; }
  G.adoCfg={orgUrl:org,project:proj,pat,epicId:epic};
  await doSync();
}

async function doSync(){
  if(G.syncing) return;
  G.syncing=true; G.syncError=null; render();
  try{
    const {orgUrl,project,pat,epicId} = G.adoCfg;
    const base = orgUrl.replace(/\/+$/,'');

    // 1. Test connection
    await adoFetch(`${base}/${encodeURIComponent(project)}/_apis/wit/workitemtypes?api-version=7.0`, pat);

    // 2. Get all descendant IDs via recursive WIQL
    const wiql = `SELECT [System.Id] FROM WorkItemLinks WHERE ([Source].[System.Id]=${epicId}) AND ([System.Links.LinkType]='System.LinkTypes.Hierarchy-Forward') MODE (Recursive)`;
    const linkRes = await adoPost(`${base}/${encodeURIComponent(project)}/_apis/wit/wiql?api-version=7.0&$top=1000`, pat, {query:wiql});
    const ids = new Set([epicId]);
    (linkRes.workItemRelations||[]).forEach(r=>{ if(r.target?.id) ids.add(r.target.id); });

    // 3. Batch-fetch work items (200 per request)
    const idArr = [...ids];
    const FIELDS = 'System.Id,System.Title,System.State,System.WorkItemType,System.AssignedTo,System.Parent,Microsoft.VSTS.Scheduling.StartDate,Microsoft.VSTS.Scheduling.FinishDate,Microsoft.VSTS.Scheduling.TargetDate';
    let raw = [];
    for(let i=0;i<idArr.length;i+=200){
      const chunk = idArr.slice(i,i+200);
      const res = await adoFetch(`${base}/_apis/wit/workitems?ids=${chunk.join(',')}&fields=${FIELDS}&api-version=7.0`, pat);
      raw = raw.concat(res.value||[]);
    }

    // 4. Map to UI shape
    const mapped = mapAdoItems(raw, epicId);
    rebuildWsMeta(mapped);

    G.items = mapped;
    G.connected = true;
    G.lastSync = new Date().toISOString();

    await storageSet('t2e_items', JSON.stringify(mapped));
    await storageSet('t2e_sync', G.lastSync);
    await storageSet('t2e_ado_cfg', JSON.stringify(G.adoCfg));

    // Switch to overview after first connect
    if(G.tab==='sync') G.tab='overview';
  }catch(e){
    G.syncError = e.message;
  }
  G.syncing=false; render();
}

function doDisconnect(){
  G.connected=false; G.items=[]; G.lastSync=null; G.syncError=null;
  G.adoCfg={orgUrl:'https://dev.azure.com/SmartQ-Global-Digital-Cafeteria-Suite',project:'Gartner - SQ Transformation',pat:'',epicId:5276};
  storageDel('t2e_items'); storageDel('t2e_sync'); storageDel('t2e_ado_cfg');

}

async function confirmReset(){
  if(!confirm('Reset all data? This cannot be undone.')) return;
  G.items=[]; G.lastSync=null; G.overrides={}; G.meetings=[]; G.connected=false;
  for(const k of['t2e_items','t2e_sync','t2e_overrides','t2e_meetings','t2e_ado_cfg']) await storageDel(k);
  render();
}
window.doConnect=doConnect; window.doSync=doSync; window.doDisconnect=doDisconnect; window.confirmReset=confirmReset;

// ── MAIN RENDER ──
function render(){
  buildNav();
  const mc = document.getElementById("main-content");
  const tab = G.tab;
  // Always allow sync tab; show connect prompt for all other tabs when disconnected
  if(!G.connected && tab!=="sync"){
    mc.innerHTML=`<div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column;gap:14px;color:var(--text2)">
      <div style="font-size:32px">🔌</div>
      <div style="font-size:15px;font-weight:600;color:var(--text)">Not connected to Azure DevOps</div>
      <div style="font-size:13px">Enter your ADO details to load live project data.</div>
      <button class="btn btn-primary" onclick="setTab('sync')">🔄 Connect now</button>
    </div>`;
    return;
  }
  if(tab==="overview") mc.innerHTML = renderOverview();
  else if(tab==="weekly") mc.innerHTML = renderWeekly();
  else if(tab==="actions") mc.innerHTML = renderActions();
  else if(tab==="all") mc.innerHTML = renderAll();
  else if(tab==="sync") mc.innerHTML = renderSync();
  else if(tab.startsWith("owner-")) mc.innerHTML = renderOwner(tab.replace("owner-",""));
}

// ── BOOT ──
(async function(){
  await loadStorage();
  // If we restored items from storage, rebuild WS meta from them
  if(G.items.length) rebuildWsMeta(G.items);
  // Start on sync tab if not connected, overview if already have data
  if(!G.connected) G.tab='sync';
  render();
})();
</script>
</body>
</html>
