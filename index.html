<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Time2Eat Migration Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nav:#0f172a;--nav-text:#94a3b8;--nav-active:#f1f5f9;--nav-accent:#3b82f6;
  --bg:#f8fafc;--surface:#ffffff;--surface2:#f1f5f9;
  --border:#e2e8f0;--border2:#cbd5e1;
  --text:#0f172a;--text2:#475569;--text3:#94a3b8;
  --red:#ef4444;--red-bg:#fef2f2;--red-t:#b91c1c;
  --amber:#f59e0b;--amber-bg:#fffbeb;--amber-t:#92400e;
  --green:#10b981;--green-bg:#f0fdf4;--green-t:#065f46;
  --blue:#3b82f6;--blue-bg:#eff6ff;--blue-t:#1e40af;
  --font:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
  --r:8px;--rl:12px;--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
html,body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;height:100%}
button{cursor:pointer;font-family:inherit}
select,input,textarea{font-family:inherit}

/* ── APP SHELL ── */
.app{display:flex;min-height:100vh}

/* ── NAV ── */
.nav{width:220px;min-width:220px;background:var(--nav);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.nav::-webkit-scrollbar{width:3px}
.nav::-webkit-scrollbar-thumb{background:#1e293b;border-radius:2px}
.nav-logo{padding:20px 16px 12px;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo h1{font-size:13px;font-weight:600;color:#f1f5f9;letter-spacing:.02em}
.nav-logo p{font-size:11px;color:var(--nav-text);margin-top:2px}
.nav-section{padding:16px 8px 4px;font-size:10px;font-weight:600;letter-spacing:.08em;color:#475569;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:6px;margin:1px 8px;color:var(--nav-text);font-size:13px;font-weight:400;cursor:pointer;border:none;background:none;width:calc(100% - 16px);text-align:left;transition:background .15s,color .15s}
.nav-item:hover{background:rgba(255,255,255,.06);color:#e2e8f0}
.nav-item.active{background:rgba(59,130,246,.15);color:var(--nav-active);font-weight:500}
.nav-item .icon{font-size:15px;opacity:.8}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:600;padding:1px 6px}
.nav-badge.amb{background:var(--amber)}
.nav-bottom{margin-top:auto;padding:12px 8px;border-top:1px solid rgba(255,255,255,.06)}
.sync-info{font-size:10px;color:#475569;padding:4px 8px;line-height:1.4}

/* ── MAIN ── */
.main{flex:1;padding:24px 28px;overflow-y:auto;min-width:0}
.page-header{margin-bottom:20px}
.page-header h2{font-size:18px;font-weight:600;color:var(--text)}
.page-header p{font-size:13px;color:var(--text2);margin-top:3px}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:16px 18px}
.card-sm{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}

/* ── METRIC GRID ── */
.metric-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:12px;margin-bottom:20px}
.mc{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px}
.mc-lbl{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.mc-val{font-size:26px;font-weight:600;line-height:1}
.mc-sub{font-size:11px;color:var(--text3);margin-top:4px}
.mc.danger{border-color:#fecaca;background:#fef2f2}.mc.danger .mc-val{color:var(--red-t)}
.mc.warn{border-color:#fde68a;background:#fffbeb}.mc.warn .mc-val{color:var(--amber-t)}
.mc.good{border-color:#a7f3d0;background:#f0fdf4}.mc.good .mc-val{color:var(--green-t)}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:.02em}
.badge-red{background:var(--red-bg);color:var(--red-t)}
.badge-amber{background:var(--amber-bg);color:var(--amber-t)}
.badge-green{background:var(--green-bg);color:var(--green-t)}
.badge-blue{background:var(--blue-bg);color:var(--blue-t)}
.badge-gray{background:var(--surface2);color:var(--text2)}

/* ── PROGRESS ── */
.prog-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .4s}

/* ── ITEM LIST ── */
.item-list{display:flex;flex-direction:column;gap:2px}
.item-row{display:grid;align-items:center;padding:8px 10px;border-radius:6px;gap:10px;transition:background .12s;cursor:default;grid-template-columns:44px 1fr 70px 90px 120px}
.ws-no-owner .item-row{grid-template-columns:44px 1fr 90px 120px}
.ws-no-owner .iowner{display:none}
.item-row:hover{background:var(--surface2)}
.item-row.overdue{border-left:3px solid var(--red);padding-left:8px}
.item-row.thisweek{border-left:3px solid var(--amber);padding-left:8px}
.iid{font-family:var(--mono);font-size:10px;color:var(--text3)}
.ititle{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.iowner{font-size:11px;color:var(--text2)}
.idt{font-size:11px;font-family:var(--mono)}
.idt.red{color:var(--red-t);font-weight:500}
.idt.amb{color:var(--amber-t);font-weight:500}

/* ── WS CARDS ── */
.ws-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.ws-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--rl);padding:14px;transition:border-color .15s}
.ws-card:hover{border-color:var(--border2)}
.ws-name{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ws-sub{font-size:11px;color:var(--text2);margin-bottom:8px}
.ws-counts{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px}
.ws-expand{background:none;border:none;font-size:11px;color:var(--blue);margin-top:6px;padding:0;cursor:pointer}
.ws-items{margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}


/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:12px;font-weight:500;transition:all .15s;white-space:nowrap;cursor:pointer}
.btn:hover{background:var(--surface2)}
.btn-primary{background:var(--nav);color:#f1f5f9;border-color:var(--nav)}
.btn-primary:hover{background:#1e293b}
.btn-danger{background:var(--red-bg);color:var(--red-t);border-color:#fecaca}
.btn-danger:hover{background:#fee2e2}
.btn-success{background:var(--green-bg);color:var(--green-t);border-color:#a7f3d0}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-icon{padding:5px 8px;border-radius:6px}

/* ── INPUTS ── */
.inp{padding:7px 10px;border:1px solid var(--border2);border-radius:var(--r);background:var(--surface);color:var(--text);font-size:12px;width:100%;outline:none;transition:border .15s}
.inp:focus{border-color:var(--blue)}
.inp-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;border-radius:var(--rl);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--text)}
td{padding:8px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}

/* ── MISC ── */
.section-title{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text2);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.sep{height:1px;background:var(--border);margin:16px 0}
.scroll-area{max-height:360px;overflow-y:auto;padding-right:2px}
.scroll-area::-webkit-scrollbar{width:4px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.empty-state{text-align:center;padding:32px;color:var(--text3);font-size:13px}
.chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text2)}
.state-sel{padding:3px 6px;border:1px solid var(--border2);border-radius:6px;font-size:11px;background:var(--surface);color:var(--text)}
.call-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto auto auto;gap:10px;align-items:center}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.alert{padding:10px 14px;border-radius:var(--r);font-size:12px;margin-bottom:12px}
.alert-red{background:var(--red-bg);color:var(--red-t);border:1px solid #fecaca}
.alert-green{background:var(--green-bg);color:var(--green-t);border:1px solid #a7f3d0}
.alert-amber{background:var(--amber-bg);color:var(--amber-t);border:1px solid #fde68a}
.action-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:6px}
.action-item.done{opacity:.5}
.action-item.done .ai-title{text-decoration:line-through}
.meeting-header{background:var(--nav);color:#f1f5f9;border-radius:var(--rl);padding:16px 18px;margin-bottom:16px}
.meeting-header h3{font-size:15px;font-weight:600;margin-bottom:2px}
.meeting-header p{font-size:12px;color:#94a3b8}

/* ── GANTT ── */
.gantt-outer{overflow-x:auto;border:1px solid var(--border);border-radius:var(--rl);background:var(--surface)}
.gantt-inner{min-width:960px}
.gantt-hdr{display:flex;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:12;background:var(--surface)}
.gantt-lc{padding:0 12px;display:flex;align-items:center;font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);border-right:1px solid var(--border);position:sticky;left:0;z-index:13;letter-spacing:.07em;text-transform:uppercase;height:34px;flex-shrink:0}
.gantt-tc{flex:1;position:relative;height:34px}
.row-feat{min-height:38px;display:flex;border-bottom:1px solid #e2e8f0;background:#f8fafc;cursor:pointer}
.row-feat:hover{background:#f1f5f9}
.row-story{min-height:30px;display:flex;border-bottom:1px solid #f1f5f9}
.row-story:hover{background:var(--surface2)}
.row-task{min-height:24px;display:flex;border-bottom:1px solid #f8f9fa;background:#fafbfd}
.row-task:hover{background:var(--surface2)}
.name-cell{padding:0 10px;display:flex;align-items:center;gap:7px;position:sticky;left:0;border-right:1px solid var(--border);z-index:2;flex-shrink:0}
.time-cell{flex:1;position:relative;min-height:inherit}

/* ── FILTER PILLS ── */
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;align-items:center;padding:7px 0 9px;border-bottom:1px solid var(--border);margin-bottom:8px}

@media(max-width:1100px){.metric-grid,.ws-grid{grid-template-columns:repeat(2,1fr)}.two-col{grid-template-columns:1fr}}


/* ── ITEM DETAIL POPUP ── */
#item-popup{display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(0,0,0,.45);backdrop-filter:blur(3px)}
#item-popup.open{display:flex}
#item-popup-inner{background:var(--surface);border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.2);width:min(480px,92vw);overflow:hidden}
#item-popup-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
#item-popup-body{padding:16px 20px}
#item-popup-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
/* ── ITEM TOOLTIP ── */
#iid-tooltip{
  position:fixed;z-index:9999;pointer-events:none;
  background:#1e293b;color:#f1f5f9;
  border-radius:8px;padding:10px 13px;
  font-size:11px;line-height:1.7;
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  max-width:280px;white-space:nowrap;
  opacity:0;transition:opacity .12s;
}
#iid-tooltip.visible{opacity:1}
#iid-tooltip .tt-id{font-family:var(--mono);font-size:10px;color:#94a3b8;margin-bottom:4px}
#iid-tooltip .tt-title{font-weight:600;color:#f8fafc;white-space:normal;margin-bottom:6px;line-height:1.4}
#iid-tooltip .tt-row{display:flex;gap:6px;align-items:center}
#iid-tooltip .tt-label{color:#64748b;min-width:56px;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
#iid-tooltip .tt-val{color:#e2e8f0}

/* ── MOBILE (≤768px only — does not affect desktop) ── */
.mob-bar{display:none}
.nav-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99;backdrop-filter:blur(2px)}
@media(max-width:768px){
  /* Top bar */
  .mob-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;
    background:var(--nav);position:sticky;top:0;z-index:101;
    border-bottom:1px solid rgba(255,255,255,.08)}
  .mob-bar-title{font-size:13px;font-weight:600;color:#f1f5f9}
  .mob-bar-btn{background:none;border:none;color:#94a3b8;font-size:20px;padding:4px 6px;line-height:1;cursor:pointer}
  /* Nav drawer */
  .nav{position:fixed;top:0;left:0;height:100vh;z-index:100;
    transform:translateX(-100%);transition:transform .25s ease;width:240px}
  .nav.open{transform:translateX(0)}
  .nav-overlay.open{display:block}
  /* Layout */
  .app{flex-direction:column}
  .main{padding:14px 12px}
  /* Grids */
  .metric-grid{grid-template-columns:repeat(2,1fr)!important;gap:8px;margin-bottom:14px}
  .mc-val{font-size:20px}
  .ws-grid{grid-template-columns:1fr!important}
  .two-col{grid-template-columns:1fr!important}
  /* Typography */
  .page-header h2{font-size:16px}
  .page-header{margin-bottom:14px}
  .card{padding:12px 14px}
  /* Item rows: reflow to 2-line */
  .item-row{grid-template-columns:1fr auto!important;grid-template-rows:auto auto!important;gap:2px 8px!important;padding:10px!important}
  .item-row .iid{grid-row:1;grid-column:2;text-align:right}
  .item-row .ititle{grid-row:1;grid-column:1;white-space:normal!important}
  .item-row .iowner{grid-row:2;grid-column:1}
  .item-row .idt{grid-row:2;grid-column:2;text-align:right}
  /* Owner URow reflow */
  .urow{grid-template-columns:1fr auto!important;grid-template-rows:auto auto!important;gap:2px 6px!important}
  .urow .urow-id{grid-row:1;grid-column:2;text-align:right}
  .urow .urow-title{grid-row:1;grid-column:1;white-space:normal!important}
  .urow .urow-date{grid-row:2;grid-column:1}
  .urow .urow-state{grid-row:2;grid-column:2}
  /* Owner page header */
  .owner-hdr{flex-wrap:wrap!important;gap:12px!important}
  .owner-hdr-pct{text-align:left!important;flex-shrink:unset!important}
  /* Gantt touch scroll */
  .gantt-outer{-webkit-overflow-scrolling:touch}
  /* Inputs — prevent iOS zoom on focus */
  .inp{font-size:16px!important}
  select.inp{font-size:16px!important}
  /* Filter dropdown panels — slide up as sheet */
  .gd-panel{position:fixed!important;top:auto!important;bottom:0!important;
    left:0!important;right:0!important;width:100%!important;
    max-height:60vh;border-radius:14px 14px 0 0;z-index:200}
}

/* ── CHAT ── */
#chat-fab{position:fixed;bottom:24px;right:24px;z-index:500;width:50px;height:50px;border-radius:50%;background:#3b82f6;border:none;cursor:pointer;color:#fff;font-size:20px;box-shadow:0 4px 16px rgba(59,130,246,.4);transition:transform .15s;display:none}
#chat-fab:hover{transform:scale(1.08)}
#chat-panel{position:fixed;bottom:86px;right:24px;z-index:500;width:340px;max-height:480px;background:var(--surface);border:1px solid var(--border2);border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);display:none;flex-direction:column;overflow:hidden}
#chat-panel.open{display:flex}
#chat-ph{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
#chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;min-height:100px}
.cm{max-width:85%;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5;word-break:break-word}
.cm.u{align-self:flex-end;background:#3b82f6;color:#fff;border-bottom-right-radius:3px}
.cm.b{align-self:flex-start;background:var(--surface2);color:var(--text);border-bottom-left-radius:3px}
#chat-ir{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
#chat-in{flex:1;border:1px solid var(--border2);border-radius:8px;padding:7px 10px;font-size:12px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
#chat-in:focus{border-color:#3b82f6}
#chat-snd{padding:7px 12px;background:#3b82f6;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px}
@media(max-width:768px){#chat-panel{width:calc(100vw - 20px);right:10px;bottom:76px}}

</style>
</head>
<body>
<div id="iid-tooltip"></div>
<div id="item-popup" onclick="if(event.target===this)closeItemPopup()">
  <div id="item-popup-inner">
    <div id="item-popup-header">
      <div style="flex:1">
        <div id="item-popup-type" style="font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px"></div>
        <div id="item-popup-title" style="font-size:15px;font-weight:700;color:var(--text);line-height:1.4"></div>
      </div>
      <button onclick="closeItemPopup()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text3);padding:0;line-height:1;flex-shrink:0">✕</button>
    </div>
    <div id="item-popup-body"></div>
    <div id="item-popup-footer">
      <button id="item-popup-ado" class="btn btn-primary" onclick="closeItemPopup()" style="font-size:12px">Open in ADO ↗</button>
    </div>
  </div>
</div>
<!-- MOBILE TOP BAR -->
<div class="mob-bar">
  <button class="mob-bar-btn" onclick="openNav()" aria-label="Menu">☰</button>
  <span class="mob-bar-title">New Time2Eat Migration Project</span>
  <button class="mob-bar-btn" onclick="quickSync()" aria-label="Sync">🔄</button>
</div>
<div class="nav-overlay" id="nav-overlay" onclick="closeNav()"></div>
<div class="app">

<!-- NAV -->
<nav class="nav" id="nav">
  <div class="nav-logo">
    <h1 id="nav-greeting">👋 Welcome</h1>
  </div>
  <div class="nav-section">Navigation</div>
  <button class="nav-item active" id="nv-overview" onclick="setTab('overview')"><span class="icon">📊</span>Overview</button>
  <button class="nav-item" id="nv-all" onclick="setTab('all')"><span class="icon">📋</span>All Items</button>
  <button class="nav-item" id="nv-mytasks" onclick="setTab('mytasks')"><span class="icon">👤</span>My Tasks</button>
  <button class="nav-item" id="nv-weekly" onclick="setTab('weekly')"><span class="icon">📈</span>Weekly Analysis</button>
  <button class="nav-item" id="nv-exec" onclick="setTab('exec')" style="display:none"><span class="icon">📄</span>Executive Summary</button>
  <button class="nav-item" id="nav-sync-action" onclick="quickSync()" style="margin-top:4px;border:1px solid var(--border2);font-weight:600"><span class="icon" id="nav-sync-icon2">↻</span><span id="nav-sync-label2">Sync Now</span></button>
  <div class="sync-info" id="sync-info" style="padding:4px 12px;font-size:10px;color:#475569">Not connected</div>
  <div class="nav-section" style="margin-top:8px">Team</div>
  <div style="padding:4px 8px 4px">
    <input id="team-search-inp" placeholder="Search team…" value="" oninput="G.teamSearch=this.value;buildNav()" style="width:100%;box-sizing:border-box;padding:4px 8px;border:1px solid rgba(255,255,255,.12);border-radius:6px;background:rgba(255,255,255,.06);color:#f1f5f9;font-size:11px;outline:none;placeholder-color:#94a3b8">
  </div>
  <div id="nav-team"></div>
  <div class="nav-bottom">

function ownerMeta(n){ return OWNER_META[n] || {color:"#6b7280",role:"Team member"}; }
function ownerColor(n){ return ownerMeta(n).color; }
function ownerInit(n){ return (n||"?").slice(0,2).toUpperCase(); }

function dl(tgt){ return tgt ? Math.round((new Date(tgt)-new Date())/86400000) : null; }
function urgency(it){
  if(it.state==="Closed") return "done";
  const d=dl(it.target);
  if(d===null) return "later";
  if(d<0) return "overdue";
  if(d<=7) return "thisweek";
  if(d<=14) return "nextweek";
  return "later";
}
function fmtDate(s){
  if(!s) return "—";
  const d=new Date(s);
  return `${d.getDate()} ${["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()]}`;
}
function fmtDateFull(s){
  if(!s) return "";
  const d = new Date(s);
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})
    + " " + d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
}
function genId(){ return Math.random().toString(36).slice(2,9); }

function effectiveItems(){
  return G.items.map(it => G.overrides[it.id] ? {...it,state:G.overrides[it.id]} : it);
}

function tlPct(dateStr){
  if(!dateStr) return 0;
  return Math.max(0,Math.min(100,(new Date(dateStr)-TL_START)/TL_MS*100));
}
function tlW(s,e){
  if(!s||!e) return 0.4;
  const ms=Math.max(new Date(s),TL_START);
  const me=Math.min(new Date(e),TL_END);
  return Math.max(0.4,(me-ms)/TL_MS*100);
}
function barColor(it){
  if(it.state==="Closed") return "#10b981";
  const u=urgency(it);
  if(u==="overdue") return "#ef4444";
  if(u==="thisweek") return "#f59e0b";
  if(it.state==="In Progress"||it.state==="Active") return "#3b82f6";
  return "#cbd5e1";
}
function barOpacity(it){ return (it.state==="Yet to Start"||it.state==="New") ? 0.65 : 1; }

function stateBadge(state){
  const map={"Closed":"badge-green","In Progress":"badge-blue","Active":"badge-blue","Yet to Start":"badge-gray","New":"badge-gray"};
  return `<span class="badge ${map[state]||'badge-gray'}">${state}</span>`;
}

function stateSelect(id, state, onChange){

// ── GANTT ──
function buildGanttMonths(){
  const out=[];
  let d=new Date(TL_START);
  while(d<=TL_END){
    out.push({label:d.toLocaleDateString("en-GB",{month:"short"}),yr:String(d.getFullYear()).slice(2),left:tlPct(d.toISOString().slice(0,10))});
    d=new Date(d.getFullYear(),d.getMonth()+1,1);
  }
  return out;
}

function buildHierarchy(items){
  // Build lookup maps from actual ADO parent-child relationships
  const byId = new Map(items.map(i=>[i.id, i]));

  // Map each Feature (level 2) to its WS bucket
  const featureToWS = new Map();
  const wsMap = new Map(); // ws key -> {ws, feature, stories:[]}

  items.filter(i=>i.level===2).forEach(feat=>{
    featureToWS.set(feat.id, feat.ws);
    if(!wsMap.has(feat.ws)){
      wsMap.set(feat.ws, {ws:feat.ws, feature:feat, stories:[]});
    }
  });

  // Map each Story (level 3) to its story bucket, keyed by id
  const storyMap = new Map(); // story id -> {story, tasks:[]}

  items.filter(i=>i.level===3).forEach(story=>{
    const bucket = {story, tasks:[]};
    storyMap.set(story.id, bucket);
    // Find which WS feature is the ancestor
    const parentFeature = byId.get(story.parentId);
    const wsKey = parentFeature ? parentFeature.ws : story.ws;
    const wsBucket = wsMap.get(wsKey);
    if(wsBucket) wsBucket.stories.push(bucket);
  });

  // Assign Tasks (level 4) to their parent story
  items.filter(i=>i.level===4).forEach(task=>{
    // Direct parent may be story or feature
    const parentStory = storyMap.get(task.parentId);
    if(parentStory){
      parentStory.tasks.push(task);
    } else {
      // Task parented directly under a feature — create a virtual story wrapper
      const parentFeat = byId.get(task.parentId);
      if(parentFeat && parentFeat.level===2){
        const wsKey = parentFeat.ws;
        const wsBucket = wsMap.get(wsKey);
        if(wsBucket){
          // Find or create a "direct tasks" virtual story per feature
          const virtualId = `virtual-${task.parentId}`;
          let vBucket = storyMap.get(virtualId);
          if(!vBucket){
            vBucket = {story:{...parentFeat, id:virtualId, title:'(Direct Tasks)', level:3, _virtual:true}, tasks:[]};
            storyMap.set(virtualId, vBucket);
            wsBucket.stories.push(vBucket);
          }
          vBucket.tasks.push(task);
        }
      }
    }
  });

  // Return WS buckets in WS key order, with stories/tasks sorted by id
  const wss = [...wsMap.values()].sort((a,b)=>a.ws.localeCompare(b.ws));
  wss.forEach(ws=>{
    ws.stories.sort((a,b)=>{
      if(a.story._virtual) return 1;
      if(b.story._virtual) return -1;
      return a.story.id - b.story.id;
    });
    ws.stories.forEach(s=>s.tasks.sort((a,b)=>a.id-b.id));
  });
  return wss;
}

function ganttHTML(items, NAME_W=300, showFeat=true){
  const months = buildGanttMonths();
  const todayPct = tlPct(new Date().toISOString().slice(0,10));
  const hierarchy = buildHierarchy(items);

  // Grid lines
  const gridLines = months.map(m=>`<div style="position:absolute;left:${m.left}%;top:0;bottom:0;border-left:1px solid #f1f5f9;pointer-events:none"></div>`).join("");
  // Today/GoLive
  const todayLine = `<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;border-left:1.5px dashed #ef444488;z-index:4;pointer-events:none"></div>`;
  const goliveLine = "";

  let html = `<div class="gantt-outer"><div class="gantt-inner" style="min-width:${NAME_W+600}px">`;

  // Header
  html += `<div class="gantt-hdr">
    <div class="gantt-lc" style="width:${NAME_W}px;min-width:${NAME_W}px">Work Item</div>
    <div class="gantt-tc" style="height:34px;position:relative">
      ${months.map(m=>`<div style="position:absolute;left:${m.left}%;top:0;bottom:0;display:flex;align-items:center;padding-left:5px;font-size:10px;font-weight:600;color:var(--text3);border-left:1px solid var(--border);letter-spacing:.04em;pointer-events:none;user-select:none">${m.label} '${m.yr}</div>`).join("")}
      <div style="position:absolute;left:${todayPct}%;top:0;bottom:0;border-left:1.5px dashed #ef4444;z-index:5;pointer-events:none">
        <div style="position:absolute;bottom:2px;left:3px;font-size:9px;font-weight:700;color:#ef4444;white-space:nowrap">Today</div>
      </div>

    </div>
  </div>`;

  // Feature/Story/Task rows
  hierarchy.forEach(ws=>{
    const gf = G.ganttFilter;
    const filterActive = gf.state.length>0 || gf.owner.length>0;
    const isExpF = G.expandedWS[ws.ws] === false ? false : (filterActive || G.expandedWS[ws.ws] === true);
    const wsc = WS_COLORS[ws.ws];
    const fLeft = tlPct(ws.feature.start), fW = tlW(ws.feature.start, ws.feature.target);
    const allChildren = ws.stories.flatMap(s=>[s.story,...s.tasks]);
    const closedPct = allChildren.length ? allChildren.filter(i=>i.state==="Closed").length/allChildren.length*100 : 0;

    html += `<div class="row-feat" onclick="toggleWS('${ws.ws}')">
      <div class="name-cell" style="width:${NAME_W}px;min-width:${NAME_W}px;background:#f8fafc;border-left:3px solid ${wsc}" title="${ws.feature.title} | ${ws.ws}">
        <span style="font-size:10px;color:var(--text3);width:14px;text-align:center;flex-shrink:0">${isExpF?"▼":"▶"}</span>
        <span style="width:9px;height:9px;border-radius:2px;background:${wsc};flex-shrink:0"></span>
        <span style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--text)" title="Feature: ${ws.feature.title}">${ws.feature.title}</span>
      </div>
      <div class="time-cell" style="background:#f8fafc">
        ${gridLines}${todayLine}${goliveLine}
        <div title="${ws.feature.title}&#10;${ws.feature.start?fmtDate(ws.feature.start):'No start'} → ${ws.feature.target?fmtDate(ws.feature.target):'No end'}&#10;${Math.round(closedPct)}% complete · ${ws.feature.state}" style="position:absolute;left:${fLeft}%;width:${fW}%;top:50%;transform:translateY(-50%);height:12px;border-radius:6px;background:${barColor(ws.feature)};opacity:0.25;min-width:4px">
          <div style="position:absolute;left:0;top:0;bottom:0;width:${closedPct}%;background:${barColor(ws.feature)};border-radius:6px;opacity:4"></div>
        </div>
      </div>
    </div>`;

    if(isExpF){
      ws.stories.forEach(us=>{
        const isExpS = G.expandedStory[us.story.id] === false ? false : (filterActive || G.expandedStory[us.story.id] === true);
        const hasTasks = us.tasks.length>0;
        const sLeft=tlPct(us.story.start),sW=tlW(us.story.start,us.story.target);
        const bc=barColor(us.story);
        const op=barOpacity(us.story);

        html += `<div class="row-story" style="cursor:${hasTasks?"pointer":"default"}" onclick="${hasTasks?"toggleStory("+us.story.id+")":"void(0)"}">
          <div class="name-cell" style="width:${NAME_W}px;min-width:${NAME_W}px;padding-left:18px;border-left:3px solid ${wsc}44" title="${us.story.title} | ${us.story.owner} | ${us.story.state}">
            <span style="width:14px;font-size:10px;color:var(--text3);text-align:center;flex-shrink:0">${hasTasks?(isExpS?"▼":"▶"):"<span style='opacity:.3'>—</span>"}</span>
            <span style="width:7px;height:7px;border-radius:50%;background:${bc};opacity:${op};flex-shrink:0"></span>
            <span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--text2)" title="User Story: ${us.story.title}">${us.story.title}</span>
            ${hasTasks?`<span style="font-size:9px;color:var(--text3);background:var(--surface2);padding:1px 4px;border-radius:3px">${us.tasks.length} tasks</span>`:""}
          </div>
          <div class="time-cell">
            ${gridLines}${todayLine}${goliveLine}
            <div title="${us.story.title}&#10;${us.story.start?fmtDate(us.story.start):'No start'} → ${us.story.target?fmtDate(us.story.target):'No end'}&#10;${us.story.owner} · ${us.story.state}" style="position:absolute;left:${sLeft}%;width:${sW}%;top:50%;transform:translateY(-50%);height:8px;border-radius:4px;background:${bc};opacity:${op};min-width:3px"></div>
          </div>
        </div>`;

        if(isExpS){
          us.tasks.forEach(task=>{
            const tLeft=tlPct(task.start),tW=tlW(task.start,task.target);
            const tbc=barColor(task),tOp=barOpacity(task);
            html += `<div class="row-task">
              <div class="name-cell" style="width:${NAME_W}px;min-width:${NAME_W}px;background:#fafbfd;padding-left:34px;border-left:3px solid ${wsc}22" title="${task.title} | ${task.owner} | ${task.state}">
                <span style="width:5px;height:5px;border-radius:50%;background:${tbc};opacity:${tOp};flex-shrink:0;margin-right:4px"></span>
                <span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--text3)" title="Task: #${task.id} · ${task.owner} · ${task.title}">${task.title}</span>
                <span style="font-size:9px;color:var(--text3);font-family:var(--mono);opacity:.6">${task.owner[0]}</span>
              </div>
              <div class="time-cell" style="background:#fafbfd">
                ${gridLines}${todayLine}${goliveLine}
                <div title="${task.title}&#10;${task.start?fmtDate(task.start):'No start'} → ${task.target?fmtDate(task.target):'No end'}&#10;${task.owner} · ${task.state}" style="position:absolute;left:${tLeft}%;width:${tW}%;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;background:${tbc};opacity:${tOp};min-width:3px"></div>
              </div>
            </div>`;
          });
        }
      });
    }
  });

  html += `</div></div>`;
  return html;
}

function toggleWS(ws){
  if(G.expandedWS[ws] === undefined) G.expandedWS[ws] = true;
  else if(G.expandedWS[ws] === true)  G.expandedWS[ws] = false;
  else                                  delete G.expandedWS[ws];
  render();
}
function toggleStory(id){
  if(G.expandedStory[id] === undefined) G.expandedStory[id] = true;
  else if(G.expandedStory[id] === true)  G.expandedStory[id] = false;
  else                                    delete G.expandedStory[id];
  render();
}

    else if(ns==="all"){ F.allQ=""; F.allWS="All"; F.allState="All"; F.allOwner="All"; }

  else if(ns==="call"){ if(key==="owner")F.callOwner=val; else if(key==="ws")F.callWS=val; }

    var x = e.clientX + 14, y = e.clientY + 14;
    t.style.left = x + 'px'; t.style.top = y + 'px';
    // Flip if off-screen
    requestAnimationFrame(function(){
      var r = t.getBoundingClientRect();
      if(r.right > window.innerWidth - 8)  t.style.left = (e.clientX - r.width - 8) + 'px';
      if(r.bottom > window.innerHeight - 8) t.style.top = (e.clientY - r.height - 8) + 'px';
    });
  }
  document.addEventListener('mousemove', function(e){
    var t = el();
    if(t && t.classList.contains('visible')) positionTip(e, t);
  });

  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap">
    ${msDropdown("state","State",STATES)}
    ${msDropdown("owner","Assigned To",ganttOwners)}
    ${hasFilter?`<button onclick="ganttFilterClear()" style="padding:5px 10px;font-size:11px;color:var(--text3);background:none;border:1px solid var(--border2);border-radius:6px;cursor:pointer;white-space:nowrap">Clear all</button>
    <span style="font-size:11px;color:var(--text3)">${ganttItems.length} of ${items.length} shown</span>`:""}
  </div>
  ${ganttHTML(ganttItems)}`;
  // Workstream Health
  html += `<div class="card" style="margin-top:16px;margin-bottom:16px">
    <div class="section-title" style="margin-top:0">Workstream Health</div>
    <div class="ws-grid">
      ${wsStats.map(ws=>`<div class="ws-card">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:2px">
          <span style="width:8px;height:8px;border-radius:2px;background:${WS_COLORS[ws.ws]};flex-shrink:0"></span>
          <div class="ws-name">${ws.name}</div>
        </div>
        <div class="ws-sub">${ws.total} items &nbsp;·&nbsp; <strong>${ws.pct}%</strong> complete</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${ws.pct}%;background:${WS_COLORS[ws.ws]}"></div></div>
        <div class="ws-counts">
          <span class="badge badge-green">${ws.closed} done</span>
          ${ws.inprog>0?`<span class="badge badge-blue">${ws.inprog} active</span>`:""}
          ${ws.overdue>0?`<span class="badge badge-red">${ws.overdue} overdue</span>`:""}
        </div>
        <button class="ws-expand" onclick="toggleWsCard('${ws.ws}')">${G.expandedWS["card_"+ws.ws]?"▲ hide items":"▼ show items"}</button>
        ${G.expandedWS["card_"+ws.ws]?`<div class="ws-items scroll-area"><style>.ws-iid-hide .iid{display:none!important}</style><div class="item-list ws-no-owner">${ws.items.sort((a,b)=>{const o={"Closed":4,"In Progress":1,"Active":1,"Yet to Start":3,"New":3};return(o[a.state]||5)-(o[b.state]||5);}).map(it=>itemRowHTML(it)).join("")}</div></div>`:""}
      </div>`).join("")}
    </div>
  </div>`;

  // Overdue
  if(overdue.length>0){
    html += `<div id="ov-overdue" class="card" style="margin-bottom:16px;border-color:#fecaca">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div class="section-title" style="margin-top:0;margin-bottom:0">
          <span style="color:var(--red)">●</span> Overdue Items — action required
          <span class="badge badge-red">${filteredOD.length}${filteredOD.length!==overdue.length?" of "+overdue.length:""}</span>
        </div>
      </div>
      ${filterBarHTML(overdue,F.od.owner,F.od.ws,F.od.q,"filterOD",true)}
      ${filteredOD.length===0?`<div class="empty-state" style="padding:12px 0">No items match the filter</div>`:`<div class="item-list">${filteredOD.map(it=>itemRowHTML(it,true)).join("")}</div>`}
    </div>`;
  }

  // In Progress
  html += `<div id="ov-inprog" class="card" style="margin-bottom:16px;border-color:#bfdbfe">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-title" style="margin-top:0;margin-bottom:0">
        <span style="color:#3b82f6">●</span> In Progress
        <span class="badge" style="background:#dbeafe;color:#1d4ed8">${filteredIP.length}${filteredIP.length!==inprog.length?" of "+inprog.length:""}</span>
      </div>
    </div>
    ${filterBarHTML(inprog,F.ip.owner,F.ip.ws,F.ip.q,"filterIP",true)}
    ${filteredIP.length===0?`<div class="empty-state" style="padding:12px 0">No items match the filter</div>`:`<div class="item-list">${filteredIP.map(it=>itemRowHTML(it,true)).join("")}</div>`}
  </div>`;

  // Due this week
  html += `<div id="ov-thisweek" class="card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div class="section-title" style="margin-top:0;margin-bottom:0">
        Due This Week
        <span class="badge badge-amber">${filteredTW.length}${filteredTW.length!==thisweek.length?" of "+thisweek.length:""}</span>
      </div>
    </div>
    ${thisweek.length===0?`<div class="empty-state">Nothing due this week 🎉</div>`:
      filterBarHTML(thisweek,F.tw.owner,F.tw.ws,F.tw.q,"filterTW",true)+
      (filteredTW.length===0?`<div class="empty-state" style="padding:12px 0">No items match</div>`:`<div class="item-list">${filteredTW.map(it=>itemRowHTML(it,true)).join("")}</div>`)}
  </div>`;

  return html;
}

// ── WEEKLY CALL ──
function renderAll(){
  const items = effectiveItems();
  let filtered = items.filter(i=>{
    const qm=!F.allQ||i.title.toLowerCase().includes(F.allQ.toLowerCase())||i.owner.toLowerCase().includes(F.allQ.toLowerCase())||String(i.id).includes(F.allQ);
    const wm=F.allWS==="All"||i.ws===F.allWS;
    const sm=F.allState==="All"||i.state===F.allState;
    const om=F.allOwner==="All"||i.owner===F.allOwner;
    return qm&&wm&&sm&&om;
  });
  const s=G.allSort;
  filtered.sort((a,b)=>{
    let va=a[s.col],vb=b[s.col];
    if(s.col==="target"){va=new Date(va);vb=new Date(vb);}
    if(va<vb) return -s.dir;
    if(va>vb) return s.dir;
    return 0;
  });
  const owners=[...new Set(items.map(i=>i.owner))].sort();
  const Th=(col,lbl)=>`<th onclick="sortAll('${col}')">${lbl}${s.col===col?(s.dir>0?" ↑":" ↓"):""}</th>`;

  return `<div class="page-header"><h2>All Items</h2><p>${filtered.length} of ${items.length} items</p></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
      <input class="inp" id="all-search-inp" placeholder="Search…" value="${F.allQ}" oninput="allSearch(this.value)" style="width:200px">
      <select class="inp" onchange="filterAll('ws',this.value)" style="width:180px">
        <option value="All"${F.allWS==="All"?" selected":""}>All workstreams</option>
        ${Object.entries(WS_META).map(([k,v])=>`<option value="${k}"${F.allWS===k?" selected":""}>${k}: ${v.name}</option>`).join("")}
      </select>
      <select class="inp" onchange="filterAll('state',this.value)" style="width:150px">
        <option value="All"${F.allState==="All"?" selected":""}>All states</option>
        ${STATES.map(st=>`<option${F.allState===st?" selected":""}>${st}</option>`).join("")}
      </select>
      <select class="inp" onchange="filterAll('owner',this.value)" style="width:130px">
        <option value="All"${F.allOwner==="All"?" selected":""}>All owners</option>
        ${owners.map(o=>`<option${F.allOwner===o?" selected":""}>${o}</option>`).join("")}
      </select>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        ${Th("id","#")}${Th("title","Title")}${Th("owner","Owner")}
        <th>State</th>${Th("target","Target")}
      </tr></thead>
      <tbody>
        ${filtered.map(it=>{
          const u=urgency(it),d=dl(it.target);
          const dtLabel=it.state==="Closed"?fmtDate(it.target):u==="overdue"?`${Math.abs(d)}d overdue`:fmtDate(it.target);
          return `<tr style="background:${u==="overdue"?"#fff5f5":""};cursor:pointer" onclick="if(event.target.tagName!=='SELECT'&&event.target.tagName!=='BUTTON')window.open('${adoUrl(it.id)}','_blank')">
            <td style="font-family:var(--mono);font-size:10px"><a href="${adoUrl(it.id)}" target="_blank" rel="noopener" style="color:var(--text3);text-decoration:none;cursor:pointer" onmouseenter="this.style.textDecoration='underline'" onmouseleave="this.style.textDecoration='none'">#${it.id}</a></td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:${(it.level-2)*10+10}px">${it.title}</td>
            <td style="font-size:12px">${it.owner}</td>
            <td>${stateSelect(it.id,it.state,"allStateChange")}</td>
            <td style="font-family:var(--mono);font-size:11px;color:${u==="overdue"?"var(--red-t)":u==="thisweek"?"var(--amber-t)":""};font-weight:${["overdue","thisweek"].includes(u)?600:400}">${dtLabel}</td>
          </tr>`;
        }).join("")}
      </tbody>
    </table></div>`;
}
async function allStateChange(id,state){
  G.overrides={...G.overrides,[id]:state};
  await saveOverrides(); render();
}
function sortAll(col){ G.allSort={col,dir:G.allSort.col===col?-G.allSort.dir:1}; render(); }
window.allStateChange=allStateChange; window.sortAll=sortAll;

// ── OWNER PAGE ──
function renderOwner(owner){
  const items = effectiveItems();
  const mine    = items.filter(i=>i.owner===owner);
  const srch = it=>!G.ownerSearch||it.title.toLowerCase().includes(G.ownerSearch.toLowerCase());
  const closed  = mine.filter(i=>i.state==="Closed"&&srch(i));
  const overdue = mine.filter(i=>urgency(i)==="overdue"&&srch(i)).sort((a,b)=>dl(a.target)-dl(b.target));
  const week    = mine.filter(i=>urgency(i)==="thisweek"&&srch(i)).sort((a,b)=>dl(a.target)-dl(b.target));
  const active  = mine.filter(i=>["In Progress","Active"].includes(i.state)&&!["overdue","thisweek"].includes(urgency(i))&&srch(i));
  const upcoming= mine.filter(i=>["Yet to Start","New"].includes(i.state)&&srch(i)).sort((a,b)=>new Date(a.target)-new Date(b.target));
  const pct     = mine.length ? Math.round(mine.filter(i=>i.state==="Closed").length/mine.length*100) : 0;
  const meta    = ownerMeta(owner);
  const color   = meta.color;
  const showDone= G.ownerPageShowDone[owner];

  const months = buildGanttMonths();
  const todayPct = tlPct(new Date().toISOString().slice(0,10));
  const NAME_W_OWN = 260;

  const byWS = Object.keys(WS_META)
    .map(ws=>({ws,...WS_META[ws],its:mine.filter(i=>i.ws===ws).sort((a,b)=>new Date(a.start)-new Date(b.start))}))
    .filter(g=>g.its.length>0);

  const gridL = months.map(m=>`<div style="position:absolute;left:${m.left}%;top:0;bottom:0;border-left:1px solid #f1f5f9;pointer-events:none"></div>`).join("");
  const todayL = `<div style="position:absolute;left:${todayPct}%;top:0;bottom:0;border-left:1.5px dashed #ef444466;pointer-events:none"></div>`;
  const goliveL = "";

  function URow(it){
    const u=urgency(it),d=dl(it.target);
    const dtLabel=it.state==="Closed"?fmtDate(it.target):u==="overdue"?`${Math.abs(d)}d overdue`:u==="thisweek"?`Due ${fmtDate(it.target)}`:fmtDate(it.target);
    const dtCls=u==="overdue"?"idt red":u==="thisweek"?"idt amb":"idt";
    return `<div class="urow" style="display:grid;grid-template-columns:42px 1fr 90px 120px;gap:8px;align-items:center;padding:8px 10px;border-radius:6px;transition:background .12s;cursor:pointer" onmouseenter="this.style.background='var(--surface2)'" onmouseleave="this.style.background=''" onclick="if(event.target.tagName!=='SELECT'&&event.target.tagName!=='BUTTON')window.open('${adoUrl(it.id)}','_blank')">
      <a class="urow-id" href="${adoUrl(it.id)}" target="_blank" rel="noopener" style="font-family:var(--mono);font-size:10px;color:var(--text3);text-decoration:none;cursor:pointer" onmouseenter="this.style.textDecoration='underline'" onmouseleave="this.style.textDecoration='none'">#${it.id}</a>
      <span class="urow-title" style="font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding-left:${(it.level-2)*8}px">
        ${it.title}
      </span>
      <span class="urow-date ${dtCls}" style="font-family:var(--mono);font-size:11px">${dtLabel}</span>
      <span class="urow-state">${stateSelect(it.id,it.state,"ownerStateChange")}</span>
    </div>`;
  }

  function Section(title,dot,its){
    if(!its.length) return "";
    return `<div class="card" style="margin-bottom:12px">
      <div class="section-title" style="margin-top:0;margin-bottom:8px">
        <span style="width:7px;height:7px;border-radius:50%;background:${dot};display:inline-block;flex-shrink:0"></span>
        ${title}
        <span class="badge" style="background:${dot}22;color:${dot};font-size:10px">${its.length}</span>
      </div>
      <div>${its.map(URow).join("")}</div>
    </div>`;
  }

  let gantt = `<div style="margin-bottom:20px">
    <div class="section-title">Timeline</div>
    <div style="overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface)">
      <div style="min-width:${NAME_W_OWN+600}px">
        <div style="display:flex;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10;background:var(--surface)">
          <div style="width:${NAME_W_OWN}px;min-width:${NAME_W_OWN}px;padding:0 12px;display:flex;align-items:center;font-size:10px;font-weight:700;color:var(--text2);background:var(--surface2);border-right:1px solid var(--border);position:sticky;left:0;z-index:11;letter-spacing:.07em;text-transform:uppercase;height:32px;flex-shrink:0">${owner}'s items</div>
          <div style="flex:1;position:relative;height:32px">
            ${months.map(m=>`<div style="position:absolute;left:${m.left}%;top:0;bottom:0;display:flex;align-items:center;padding-left:5px;font-size:10px;font-weight:600;color:var(--text3);border-left:1px solid var(--border);pointer-events:none;user-select:none">${m.label} '${m.yr}</div>`).join("")}
            <div style="position:absolute;left:${todayPct}%;top:0;bottom:0;border-left:1.5px dashed #ef4444aa;z-index:5;pointer-events:none"><div style="position:absolute;bottom:3px;left:3px;font-size:9px;font-weight:700;color:#ef4444">Today</div></div>

          </div>
        </div>
        ${byWS.map(group=>`
          <div style="display:flex;background:#f8fafc;border-bottom:1px solid var(--border);min-height:26px">
            <div style="width:${NAME_W_OWN}px;min-width:${NAME_W_OWN}px;padding:0 10px;display:flex;align-items:center;gap:6px;position:sticky;left:0;background:#f8fafc;border-right:1px solid var(--border);z-index:2;flex-shrink:0">
              <span style="width:7px;height:7px;border-radius:1px;background:${WS_COLORS[group.ws]};flex-shrink:0"></span>
              <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)">${group.name}</span>
            </div>
            <div style="flex:1;position:relative;min-height:26px">${gridL}${todayL}${goliveL}</div>
          </div>
          ${group.its.map(it=>{
            const left=tlPct(it.start),w=tlW(it.start,it.target),bg=barColor(it),op=barOpacity(it),u=urgency(it);
            return `<div style="display:flex;border-bottom:1px solid #f1f5f9;min-height:26px;background:${u==="overdue"?"#fff5f5":""}">
              <div style="width:${NAME_W_OWN}px;min-width:${NAME_W_OWN}px;padding:0 10px 0 18px;display:flex;align-items:center;gap:6px;position:sticky;left:0;background:${u==="overdue"?"#fff5f5":"var(--surface)"};border-right:1px solid var(--border);z-index:2;flex-shrink:0">
                <span style="width:6px;height:6px;border-radius:1px;background:${bg};opacity:${op};flex-shrink:0"></span>
                <span style="font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:${u==="overdue"?"var(--red-t)":"var(--text)"}" title="${it.title}">${it.title}</span>
              </div>
              <div style="flex:1;position:relative;min-height:26px">${gridL}${todayL}${goliveL}<div title="${it.title} · ${it.state}" style="position:absolute;left:${left}%;width:${w}%;top:50%;transform:translateY(-50%);height:7px;border-radius:4px;background:${bg};opacity:${op};min-width:3px"></div></div>
            </div>`;
          }).join("")}`).join("")}
      </div>
    </div>
  </div>`;

  return `<div class="owner-hdr" style="display:flex;align-items:center;gap:18px;margin-bottom:20px;padding:18px 20px;background:${color}0d;border:1.5px solid ${color}30;border-radius:14px">
    <div style="width:56px;height:56px;border-radius:14px;background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:800;flex-shrink:0">${ownerInit(owner)}</div>
    <div style="flex:1">
      <h2 style="font-size:20px;font-weight:700;margin-bottom:2px">${owner}</h2>
      <p style="font-size:12px;color:var(--text2)">${meta.role}</p>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        ${overdue.length>0?`<span class="badge badge-red">${overdue.length} overdue</span>`:""}
        ${week.length>0?`<span class="badge badge-amber">${week.length} due this week</span>`:""}
        ${active.length>0?`<span class="badge badge-blue">${active.length} in progress</span>`:""}
        <span class="badge badge-green">${closed.length} closed</span>
        <span class="badge badge-gray">${mine.length} total</span>
      </div>
    </div>
    <div class="owner-hdr-pct" style="text-align:right;flex-shrink:0">
      <div style="font-size:36px;font-weight:800;color:${color};line-height:1">${pct}<span style="font-size:18px">%</span></div>
      <div style="font-size:11px;color:var(--text2);margin-top:2px">complete</div>
      <div class="prog-bar" style="width:90px;margin-top:6px;margin-left:auto"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
    </div>
  </div>

  <div class="metric-grid" style="margin-bottom:20px">
    <div class="mc"><div class="mc-lbl">Total assigned</div><div class="mc-val" style="color:${color}">${mine.length}</div><div class="mc-sub">across ${byWS.length} workstreams</div></div>
    <div class="mc ${overdue.length>0?"danger":"good"}"><div class="mc-lbl">Closed</div><div class="mc-val">${closed.length}</div><div class="mc-sub">${pct}% done</div></div>
    <div class="mc ${overdue.length>0?"danger":""}"><div class="mc-lbl">⚠ Overdue</div><div class="mc-val">${overdue.length}</div><div class="mc-sub">${overdue.length===0?"All on track":"need action"}</div></div>
    <div class="mc ${week.length>0?"warn":""}"><div class="mc-lbl">⏰ Due this week</div><div class="mc-val">${week.length}</div><div class="mc-sub">${active.length} in progress</div></div>
  </div>

  <div style="margin-bottom:12px">
    <input id="owner-page-search" class="inp" placeholder="Search items\u2026" value="${G.ownerSearch}" oninput="ownerPageSearch(this.value)" style="width:100%;max-width:320px">
  </div>

  ${mine.length>0?gantt:""}

  ${mine.length===0?`<div class="empty-state">No items assigned to ${owner}</div>`:`
    ${Section("Overdue — needs immediate attention","#ef4444",overdue)}
    ${Section("Due this week","#f59e0b",week)}
    ${Section("In Progress / Active","#3b82f6",active)}
    ${Section("Upcoming","#cbd5e1",upcoming)}
    ${closed.length>0?`<div class="card" style="margin-bottom:12px">
      <button style="display:flex;align-items:center;gap:8px;background:none;border:none;padding:0;cursor:pointer;width:100%" onclick="toggleOwnerDone('${owner}')">
        <div class="section-title" style="margin:0">
          <span style="width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block"></span>
          Closed <span class="badge badge-green">${closed.length}</span>
        </div>
        <span style="font-size:11px;color:var(--text3);margin-left:auto">${showDone?"▲ hide":"▼ show"}</span>
      </button>
      ${showDone?`<div style="margin-top:8px">${closed.map(URow).join("")}</div>`:""}
    </div>`:""}`}`;
}

async function ownerStateChange(id,state){
  G.overrides={...G.overrides,[id]:state};
  await saveOverrides(); render();
}
function toggleOwnerDone(owner){ G.ownerPageShowDone[owner]=!G.ownerPageShowDone[owner]; render(); }
window.ownerStateChange=ownerStateChange; window.toggleOwnerDone=toggleOwnerDone;

// ── ADO FETCH HELPERS ──
function adoUrl(id){ const c=G.adoCfg; return c.orgUrl&&c.project?`${c.orgUrl.replace(/\/+$/,'')}/${c.project}/_workitems/edit/${id}`:''; }

function adoAuth(pat){ try{ return 'Basic ' + btoa(unescape(encodeURIComponent(':' + pat))); }catch(e){ return 'Basic ' + btoa(':' + pat); } }

async function adoFetch(url, pat){
  const r = await fetch(url, {headers:{Authorization: adoAuth(pat), 'Accept':'application/json'}});
  const text = await r.text();
  if(!r.ok) throw new Error(r.status + ': ' + text.slice(0,200));
  if(text.trimStart().startsWith('<')) throw new Error('ADO returned HTML — check your org URL and PAT.');
  return JSON.parse(text);
}
async function adoPost(url, pat, body){
  const r = await fetch(url, {method:'POST', headers:{Authorization: adoAuth(pat),'Content-Type':'application/json','Accept':'application/json'}, body:JSON.stringify(body)});
  const text = await r.text();
  if(!r.ok) throw new Error(r.status + ': ' + text.slice(0,200));
  if(text.trimStart().startsWith('<')) throw new Error('ADO returned HTML — check your org URL and PAT.');
  return JSON.parse(text);
}

// ── STATE NORMALISATION ──
function normaliseState(raw){
  const s = (raw||'').toLowerCase().trim();
  if(['closed','done','resolved','completed'].includes(s)) return 'Closed';
  if(['active','in progress','in-progress','committed','doing'].includes(s)) return 'In Progress';
  if(['yet to start','to do','not started'].includes(s)) return 'Yet to Start';
  if(['new','proposed','approved'].includes(s)) return 'New';
  return raw || 'New';
}

// ── MAP ADO ITEMS → UI SHAPE ──
// Assigns WS1-WS9 to Features (direct children of root epic) in id order,
// then inherits WS down to stories and tasks via parent chain.
function mapAdoItems(rawItems, rootEpicId){
  const byId = new Map(rawItems.map(i=>[i.id,i]));

  // Find direct Feature children of root epic, assign WS1…WS9 in id order
  const features = rawItems
    .filter(i=>i.fields['System.Parent']===rootEpicId && i.fields['System.WorkItemType']==='Feature')
    .sort((a,b)=>a.id-b.id);
  const wsKeys = ['WS1','WS2','WS3','WS4','WS5','WS6','WS7','WS8','WS9'];
  const featureWs = new Map(features.map((f,idx)=>[f.id, wsKeys[idx] ?? `WS${idx+1}`]));

  // Walk up to find WS from Feature ancestor
  function resolveWs(item){
    if(featureWs.has(item.id)) return featureWs.get(item.id);
    const pid = item.fields['System.Parent'];
    if(!pid) return 'WS1';
    if(featureWs.has(pid)) return featureWs.get(pid);
    const parent = byId.get(pid);
    return parent ? resolveWs(parent) : 'WS1';
  }

  // Level from WorkItemType
  const typeLevel = {'Feature':2,'User Story':3,'Story':3,'Task':4,'Bug':4,'Test Case':4};

  const mapped = [];
  for(const item of rawItems){
    if(item.id === rootEpicId) continue; // skip root epic row itself
    const f = item.fields;
    const target = f['Microsoft.VSTS.Scheduling.FinishDate'] || f['Microsoft.VSTS.Scheduling.TargetDate'] || '';
    const owner = (f['System.AssignedTo']?.displayName || 'Unassigned').split(' ')[0];
    mapped.push({
      id:       item.id,
      title:    f['System.Title'] || '(no title)',
      state:    normaliseState(f['System.State']),
      owner,
      start:    (f['Microsoft.VSTS.Scheduling.StartDate']||'').slice(0,10),
      target:   target.slice(0,10),
      ws:       featureWs.get(item.id) || resolveWs(item),
      level:    typeLevel[f['System.WorkItemType']] ?? 3,
      type:     f['System.WorkItemType'] || 'Task',
      parentId:    f['System.Parent'] || null,
      changedDate:  (f['System.ChangedDate']||'').slice(0,10),
      description: (f['System.Description']||'').replace(/<[^>]*>/g,'').trim(),
    });
  }
  // Sort: features first (by ws index), then children sorted by parent ws then level then id
  const wsOrder = new Map(wsKeys.map((k,i)=>[k,i]));
  return mapped.sort((a,b)=>{
    const wa = wsOrder.get(a.ws) ?? 99;
    const wb = wsOrder.get(b.ws) ?? 99;
    return wa - wb || a.level - b.level || a.id - b.id;
  });
}

// ── BUILD DYNAMIC WS_META FROM MAPPED ITEMS ──
function rebuildWsMeta(items){
  for(const it of items){
    if(it.level===2 && !WS_META[it.ws]){
      WS_META[it.ws] = {name: it.title, owner: it.owner};
    }
  }
  // Also fill colour slots for any new WS keys
  const palette = ['#3b82f6','#0d9488','#8b5cf6','#f59e0b','#ec4899','#10b981','#6b7280','#ef4444','#a855f7'];
  Object.keys(WS_META).forEach((ws,i)=>{ if(!WS_COLORS[ws]) WS_COLORS[ws]=palette[i%palette.length]; });
}

async function doConnect(){
  const org  = document.getElementById('ado-org')?.value.trim()  || '';
  const proj = document.getElementById('ado-proj')?.value.trim() || '';
  const pat  = document.getElementById('ado-pat')?.value.trim()  || '';
  const epic = parseInt(document.getElementById('ado-epic')?.value||'5276',10)||5276;
  const remember = document.getElementById('ado-remember')?.checked || false;
  if(!org||!proj||!pat){ G.syncError='Please fill in all fields.'; render(); return; }
  G.adoCfg={orgUrl:org,project:proj,pat,epicId:epic};
  G.rememberPat = remember;
  if(remember){
    lsSet('t2e_remember_pat','1');
    lsSet('t2e_pat', pat);
  } else {
    lsDel('t2e_remember_pat');
    lsDel('t2e_pat');
  }
  await doSync();
}

async function doSync(){
  if(G.syncing) return;
  G.syncing=true; G.syncError=null; render();
  try{
    const {orgUrl,project,pat,epicId} = G.adoCfg;
    const base = orgUrl.replace(/\/+$/,'');

    // 1. Test connection
    await adoFetch(`${base}/${project}/_apis/wit/workitemtypes?api-version=7.0`, pat);

    // 2. Get all descendant IDs via recursive WIQL
    const wiql = `SELECT [System.Id] FROM WorkItemLinks WHERE ([Source].[System.Id]=${epicId}) AND ([System.Links.LinkType]='System.LinkTypes.Hierarchy-Forward') MODE (Recursive)`;
    const linkRes = await adoPost(`${base}/${project}/_apis/wit/wiql?api-version=7.0&$top=1000`, pat, {query:wiql});
    const ids = new Set([epicId]);
    (linkRes.workItemRelations||[]).forEach(r=>{ if(r.target?.id) ids.add(r.target.id); });

    // 3. Batch-fetch work items (200 per request)
    const idArr = [...ids];
    const FIELDS = 'System.Id,System.Title,System.State,System.WorkItemType,System.AssignedTo,System.Parent,Microsoft.VSTS.Scheduling.StartDate,Microsoft.VSTS.Scheduling.FinishDate,Microsoft.VSTS.Scheduling.TargetDate,System.ChangedDate,System.Description';
    let raw = [];
    for(let i=0;i<idArr.length;i+=200){
      const chunk = idArr.slice(i,i+200);
      const res = await adoFetch(`${base}/_apis/wit/workitems?ids=${chunk.join(',')}&fields=${FIELDS}&api-version=7.0`, pat);
      raw = raw.concat(res.value||[]);
    }

    // 4. Map to UI shape
    const mapped = mapAdoItems(raw, epicId);
    rebuildWsMeta(mapped);

    G.items = mapped;
    G.connected = true;
    G.lastSync = new Date().toISOString();

    await storageSet('t2e_items', JSON.stringify(mapped));
    await storageSet('t2e_sync', G.lastSync);
    lsSet('t2e_ado_cfg', JSON.stringify(G.adoCfg));

    // Switch to identify (first time) or overview after connect
    if(G.tab==='sync') G.tab = G.currentUser ? 'overview' : 'identify';
  }catch(e){
    G.syncError = e.message;
  }
  G.syncing=false; render();

}

async function doDisconnect(){
  G.connected=false; G.items=[]; G.lastSync=null; G.syncError=null;
  G.adoCfg={orgUrl:'https://dev.azure.com/SmartQ-Global-Digital-Cafeteria-Suite',project:'Gartner - SQ Transformation',pat:'',epicId:5276};
  G.rememberPat=false;
  lsDel('t2e_remember_pat'); lsDel('t2e_pat');
  await storageDel('t2e_items'); await storageDel('t2e_sync'); lsDel('t2e_ado_cfg');
  render();
}

async function confirmReset(){
  if(!confirm('Reset all data? This cannot be undone.')) return;
  G.items=[]; G.lastSync=null; G.overrides={}; G.meetings=[]; G.connected=false;
  for(const k of['t2e_items','t2e_sync','t2e_overrides','t2e_meetings']) await storageDel(k);
  lsDel('t2e_ado_cfg');
  render();
}
window.doConnect=doConnect; window.doSync=doSync; window.doDisconnect=doDisconnect; window.confirmReset=confirmReset;

// ── WEEKLY ANALYSIS ──
function renderWeeklyAnalysis(){
  const items = effectiveItems();
  const now   = new Date();
  const dayMs = 86400000;
  const waf   = G.waFilter;

  // All owners for the filter dropdown
  const allOwners = [...new Set(items.map(i=>i.owner))].sort();

  // Last week: target within past 7 days AND closed
  // Last week: Mon–Sun
  const _todayDow = now.getDay()===0?6:now.getDay()-1;
  const _thisMon  = new Date(now.getFullYear(),now.getMonth(),now.getDate()-_todayDow,0,0,0);
  const _lastMon  = new Date(_thisMon.getFullYear(),_thisMon.getMonth(),_thisMon.getDate()-7,0,0,0);
  const _lastSun  = new Date(_thisMon.getFullYear(),_thisMon.getMonth(),_thisMon.getDate()-1,23,59,59);
  const lastWeekStart = _lastMon;
  const completedLastWeek = items.filter(i=>{
    if(i.state!=="Closed") return false;
    const t = i.changedDate ? new Date(i.changedDate) : null;
    if(!t || t < lastWeekStart || t > _lastSun) return false;
    return waf.owner==="All" || i.owner===waf.owner;
  }).sort((a,b)=>new Date(b.changedDate)-new Date(a.changedDate));

  // Upcoming: default Mon–Sun of next week (local dates, no UTC shift)
  const _dow = now.getDay()===0?6:now.getDay()-1;
  const _nextMon = new Date(now.getFullYear(),now.getMonth(),now.getDate()+(7-_dow),0,0,0);
  const _nextSun = new Date(_nextMon.getFullYear(),_nextMon.getMonth(),_nextMon.getDate()+6,23,59,59);
  const upcomingStart = waf.dateFrom ? new Date(waf.dateFrom) : _nextMon;
  const nextWeekEnd   = waf.dateTo   ? new Date(waf.dateTo)   : _nextSun;
  const weekOffset = 0;
  const upcomingNextWeek = items.filter(i=>{
    if(i.state==="Closed") return false;
    const t = i.target ? new Date(i.target) : null;
    if(!t || t < upcomingStart || t > nextWeekEnd) return false;
    return waf.owner==="All" || i.owner===waf.owner;
  }).sort((a,b)=>new Date(a.target)-new Date(b.target));

  // This Week: items due Mon-Sun of current week, not Closed
  const _curMon = new Date(now.getFullYear(),now.getMonth(),now.getDate()-_todayDow,0,0,0);
  const _curSun = new Date(_curMon.getFullYear(),_curMon.getMonth(),_curMon.getDate()+6,23,59,59);
  const thisWeekItems = items.filter(i=>{
    const t = i.target ? new Date(i.target) : null;
    if(!t || t < _curMon || t > _curSun) return false;
    if(waf.twState!=="All" && i.state!==waf.twState) return false;
    return waf.owner==="All" || i.owner===waf.owner;
  }).sort((a,b)=>{ const ac=a.state==="Closed"?1:0,bc=b.state==="Closed"?1:0; return ac-bc||new Date(a.target)-new Date(b.target); });
  const thisWeekLabel = `${_curMon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${_curSun.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  const thisWeekStates = [...new Set(items.filter(i=>{
    const t = i.target ? new Date(i.target) : null;
    return t && t >= _curMon && t <= _curSun;
  }).map(i=>i.state))].sort();

  // Group by workstream
  function groupByWS(arr){
    const map = {};
    arr.forEach(i=>{ if(!map[i.ws]) map[i.ws]=[]; map[i.ws].push(i); });
    return Object.entries(map).sort((a,b)=>a[0].localeCompare(b[0]));
  }

  // Show changedDate as the display date for completed items
  const completedMapped = completedLastWeek.map(i=>Object.assign({},i,{target:i.changedDate||i.target}));
  const completedByWS  = groupByWS(completedMapped);
  const upcomingByWS   = groupByWS(upcomingNextWeek);
  const thisWeekByWS   = groupByWS(thisWeekItems);

  const weekLabel = `${_lastMon.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${_lastSun.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  const nextLabel = `${upcomingStart.toLocaleDateString('en-GB',{day:'numeric',month:'short'})} – ${nextWeekEnd.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}`;
  const nextTitle = 'Upcoming Items';

        </div>
        <div class="item-list">${its.map(it=>itemRowHTML(it,false)).join("")}</div>
      </div>`).join("");
  }

  // Status changes last week: changedDate in past 7 days, not Closed
  const changedLastWeek = items.filter(i=>{
    if(i.state==="Closed") return false;
    const t = i.changedDate ? new Date(i.changedDate) : null;
    if(!t || t < lastWeekStart || t > _lastSun) return false;
    return waf.owner==="All" || i.owner===waf.owner;
  }).sort((a,b)=>new Date(b.changedDate)-new Date(a.changedDate));
  const changedByWS = groupByWS(changedLastWeek);

      onchange="G.waFilter.owner=this.value;render()">
      <option value="All"${waf.owner==="All"?" selected":""}>All</option>
      ${allOwners.map(o=>`<option value="${o}"${waf.owner===o?" selected":""}>${o}</option>`).join("")}
    </select>
    ${isFiltered?`<button onclick="G.waFilter.owner='All';render()" style="font-size:11px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline;padding:0">clear</button>`:""}

      <div class="section-title" style="margin:0">🔄 Status Changes Last Week</div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge badge-gray">${changedLastWeek.length} items</span>
        <span style="font-size:11px;color:var(--text3)">${G.waFilter.scExpanded?"▲":"▼"}</span>
      </div>
    </div>
    ${G.waFilter.scExpanded?`
    <div style="font-size:11px;color:var(--text3);margin-top:10px;margin-bottom:12px">${weekLabel}</div>
    ${wsSection(changedByWS,"No status changes recorded in the last 7 days")}
    `:""}
  </div>

  <div class="card" style="margin-bottom:16px;border-color:#bfdbfe">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div class="section-title" style="margin:0;color:#1d4ed8">📋 This Week</div>

function render(){
  buildNav();
  const mc = document.getElementById("main-content");
  const tab = G.tab;

  // Always allow sync tab; show connect prompt for all other tabs when disconnected
  if(!G.connected && tab!=="sync"){
    G.tab = "sync";
    mc.innerHTML = renderSync();
    return;
  }
  if(tab==="identify") mc.innerHTML = renderIdentify();
  else if(tab==="mytasks") mc.innerHTML = renderMyTasks();
  else if(tab==="overview") mc.innerHTML = renderOverview();
  else if(tab==="weekly") mc.innerHTML = renderWeeklyAnalysis();
  else if(tab==="exec") mc.innerHTML = renderExec();
  else if(tab==="all") mc.innerHTML = renderAll();

}

(async function(){
  await loadStorage();
  if(G.items.length) rebuildWsMeta(G.items);
  const {orgUrl, project, pat} = G.adoCfg;
  const hasCredentials = orgUrl && project && pat;
  if(hasCredentials){
    // Check if this is the first login of the day

    const lastVisit = lsGet('t2e_last_visit');
    const firstVisitToday = lastVisit !== today;
    lsSet('t2e_last_visit', today);

  var items  = effectiveItems();

  var pct    = total ? Math.round(closed/total*100) : 0;
  var overdue= items.filter(function(i){ return urgency(i)==='overdue'; });
  var active = items.filter(function(i){ return i.state==='In Progress'||i.state==='Active'; });
  var now    = new Date();

  // Overall RAG
  var rag, ragColor, ragBg, ragLine;
  if(overdue.length>0){
    rag='At Risk'; ragColor='#dc2626'; ragBg='#fef2f2';
    ragLine=overdue.length+' item'+(overdue.length>1?'s':'')+' are overdue and require immediate attention.';
  } else if(pct<40){
    rag='In Progress'; ragColor='#d97706'; ragBg='#fffbeb';
    ragLine='Project is progressing at '+pct+'% completion. No overdue items at this time.';
  } else {
    rag='On Track'; ragColor='#16a34a'; ragBg='#f0fdf4';

  // Status sentence
  var sentence = 'The New Time2Eat Migration Project is '+pct+'% complete ('
    +closed+' of '+total+' items closed)'

  // Workstream table

    var wsAc = its.filter(function(i){ return i.state==='In Progress'||i.state==='Active'; }).length;
    var wsPct= its.length?Math.round(wsCl/its.length*100):0;
    var wsRag= wsOd>0?'#dc2626':wsPct<30?'#d97706':'#16a34a';

        +'</span>'
      +'</td>'
    +'</tr>';
  }).filter(Boolean).join('');

  // Key risks
  var ownerOd = {};
  overdue.forEach(function(i){ ownerOd[i.owner]=(ownerOd[i.owner]||[]); ownerOd[i.owner].push(i); });
  var riskBullets = Object.entries(ownerOd)
    .sort(function(a,b){ return b[1].length-a[1].length; })
    .slice(0,5)
    .map(function(e){
      var o=e[0], its=e[1];

  // Recommended actions
  var actions = [];
  if(overdue.length>0) actions.push('Conduct an immediate review of '+overdue.length+' overdue items with responsible owners and agree on revised timelines.');
  var slowWS = Object.keys(WS_META).filter(function(ws){
    var its=items.filter(function(i){return i.ws===ws;});
    return its.length>0 && Math.round(items.filter(function(i){return i.ws===ws&&i.state==='Closed';}).length/its.length*100)<25;

  if(slowWS.length) actions.push('Accelerate progress in low-completion workstreams: '+slowWS.map(function(ws){ return WS_META[ws].name; }).slice(0,3).join(', ')+'.');
  if(pct>=70) actions.push('Project is nearing completion. Focus on closing remaining '+( total-closed)+' items and preparing for go-live readiness.');
  else actions.push('Maintain current delivery velocity to achieve project targets on schedule.');

  var dateStr = now.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  var syncStr = G.lastSync ? new Date(G.lastSync).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'Not synced';

  return '<div style="max-width:860px;margin:0 auto;padding:24px;font-family:var(--font)">'

    // Header

      +'<div style="font-size:24px;font-weight:800;color:#111827;margin-bottom:8px">New Time2Eat Migration Project</div>'
      +'<div style="display:flex;gap:20px;font-size:12px;color:#6b7280">'
        +'<span>📅 '+dateStr+'</span>'
        +'<span>🔄 Data as of '+syncStr+'</span>'
        
      +'</div>'
    +'</div>'

    // Status summary
    +'<div style="background:'+ragBg+';border-left:4px solid '+ragColor+';border-radius:0 8px 8px 0;padding:14px 18px;margin-bottom:24px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:4px">'
        +'<span style="background:'+ragColor+';color:#fff;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase">'+rag+'</span>'
        +'<span style="font-size:14px;font-weight:600;color:#111827">Project Health</span>'
      +'</div>'
      +'<div style="font-size:13px;color:#374151;line-height:1.6">'+sentence+'</div>'
    +'</div>'

    // Metrics row
    +'<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px">'
      +[
        {label:'Total Items',val:total,sub:'in scope',color:'#1e3a5f'},
        {label:'Completed',val:closed+' ('+pct+'%)',sub:'items closed',color:'#16a34a'},
        {label:'In Progress',val:active.length,sub:'active items',color:'#2563eb'},
        {label:'Overdue',val:overdue.length,sub:'require action',color:overdue.length>0?'#dc2626':'#16a34a'}
      ].map(function(m){
        return '<div style="border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center">'
          +'<div style="font-size:28px;font-weight:800;color:'+m.color+';line-height:1">'+m.val+'</div>'
          +'<div style="font-size:12px;font-weight:600;color:#111827;margin-top:4px">'+m.label+'</div>'
          +'<div style="font-size:11px;color:#9ca3af;margin-top:2px">'+m.sub+'</div>'
        +'</div>';
      }).join('')
    +'</div>'

    // Completion bar
    +'<div style="margin-bottom:24px">'
      +'<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:6px">'
        +'<span>Overall Completion</span><span>'+closed+' of '+total+' items</span>'
      +'</div>'
      +'<div style="height:10px;background:#e5e7eb;border-radius:5px;overflow:hidden">'
        +'<div style="height:100%;border-radius:5px;background:'+ragColor+';width:'+pct+'%;transition:width .3s"></div>'
      +'</div>'
    +'</div>'

    // Workstream table
    +'<div style="margin-bottom:24px">'
      +'<div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e5e7eb">Workstream Summary</div>'
      +'<table style="width:100%;border-collapse:collapse">'
        +'<thead>'
          +'<tr style="background:#f9fafb">'
            +'<th style="padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Workstream</th>'
            +'<th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Items</th>'
            +'<th style="padding:10px 14px;text-align:center;font-size:11px;font-weight:600;color:#6b7280;text-transform:uppercase;letter-spacing:.05em">Completed</th>'

    // Key risks
    +'<div style="margin-bottom:24px">'
      +'<div style="font-size:14px;font-weight:700;color:#111827;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e5e7eb">Key Risks</div>'

var _chatAllowed=['Sydon','MB','Dakshath'];
function _chatCheckAccess(){
  var fab=document.getElementById('chat-fab');
  if(!fab)return;
  fab.style.display=(_chatAllowed.indexOf(G.currentUser)!==-1)?'flex':'none';
  var execBtn=document.getElementById('nv-exec');

}
window.chatOpen=function(){document.getElementById('chat-panel').classList.toggle('open');};

// Chat state
var _chatPending=null; // stores last raw search result for detail-on-request

function _chatAddMsg(text){
  var msgs=document.getElementById('chat-msgs');
  var b=document.createElement('div');b.className='cm b';b.textContent=text;msgs.appendChild(b);
  msgs.scrollTop=msgs.scrollHeight;
}

function _chatSummary(raw, items){
  if(!items||!items.length) return raw;
  var closed  = items.filter(function(i){return i.state==='Closed';}).length;
  var overdue = items.filter(function(i){return urgency(i)==='overdue';}).length;
  var owners  = {};
  items.forEach(function(i){owners[i.owner]=(owners[i.owner]||0)+1;});
  var topOwners = Object.entries(owners).sort(function(a,b){return b[1]-a[1];}).slice(0,2).map(function(e){return e[0];});
  var nearest = items.filter(function(i){return i.target&&i.state!=='Closed';})
    .sort(function(a,b){return new Date(a.target)-new Date(b.target);})[0];
  var lines=[];
  // First line: count
  lines.push('I found '+items.length+' item'+(items.length>1?'s':'')+' matching your query.');
  // Owners
  if(topOwners.length) lines.push('Primarily owned by '+topOwners.join(' and ')+'.');
  // Nearest deadline
  if(nearest) lines.push('Nearest deadline: '+fmtDate(nearest.target)+' ('+nearest.title.slice(0,40)+(nearest.title.length>40?'...':'')+').');
  // Risk
  if(overdue>0) lines.push('\u26a0 '+overdue+' item'+(overdue>1?'s are':' is')+' overdue and need attention.');
  else if(closed===items.length) lines.push('\u2705 All items in this set are closed.');
  lines.push('Would you like me to show the detailed items?');
  return lines.join('\n');
}

function _parseItems(raw){
  // Extract items from effectiveItems matching the raw result lines
  if(!raw) return [];
  var items=effectiveItems();
  var ids=[];
  raw.split('\n').forEach(function(l){
    var m=l.match(/#(\d+)/);
    if(m) ids.push(parseInt(m[1]));
  });
  if(ids.length) return items.filter(function(i){return ids.indexOf(i.id)!==-1;});
  return [];
}

window.chatSend=function(){
  var inp=document.getElementById('chat-in');
  var txt=(inp.value||'').trim();
  if(!txt)return;
  inp.value='';
  var msgs=document.getElementById('chat-msgs');
  var u=document.createElement('div');u.className='cm u';u.textContent=txt;msgs.appendChild(u);
  var q=txt.toLowerCase();

  // 1. Conversational replies
  if(/^(hi|hello|hey)/.test(q)){
    _chatAddMsg("Hi! I can help you find project items. Try asking about an owner, workstream, or status - or type help.");
    return;
  }
  if(/^(thanks|thank you|cheers|great)/.test(q)){
    _chatAddMsg("You're welcome! Let me know if there's anything else.");
    return;
  }
  if(/^(bye|goodbye|see you|cya)/.test(q)){
    _chatAddMsg('Goodbye! Come back anytime.');
    return;
  }
  if(/^help/.test(q)){
    _chatAddMsg("I can answer questions like:\n- What is Anthony working on?\n- Show WS3 items\n- What's overdue?\n- What's due next week?\n- Show completed items\n- Type test for a project snapshot.");
    return;
  }

  // 2. Pending detail request
  if(_chatPending && /^(yes|show|show me|details|detail|list|give me|ok)/.test(q)){
    _chatAddMsg(_chatPending);
    _chatPending=null;
    return;
  }
  if(_chatPending && /^(no|nope|skip|never mind)/.test(q)){
    _chatAddMsg('No problem. Ask me anything else!');
    _chatPending=null;
    return;
  }

  // 3. Test command
  var reply='';
  if(q==='test'&&window.DashboardAdapter){
    var d=DashboardAdapter.snapshot();
    reply='Project: '+d.completion.pct+'% complete ('+d.completion.closed+' of '+d.completion.total+' items). '
      +'Overdue: '+d.overdue.length+'. In Progress: '+d.inProgress.length+'. This week: '+d.thisWeek.length+'.';
    _chatAddMsg(reply); return;
  }

  // 4. Entity / keyword search — only if message looks like a project question
  var projectWords=['ws','workstream','overdue','item','task','owner','week','due','status',
    'progress','complete','closed','assigned','milestone','deadline','show','find','list','what','who','which'];
  var looksLikeQuery=projectWords.some(function(w){return q.indexOf(w)!==-1;});
  var raw='';
  if(looksLikeQuery){
    if(window.DashboardSearchExtract) raw=DashboardSearchExtract(txt)||'';
    if(!raw&&window.DashboardSearch) raw=DashboardSearch(txt)||'';
  }

  if(raw){
    var matchedItems=_parseItems(raw);
    if(matchedItems.length>0){
      _chatPending=raw;
      _chatAddMsg(_chatSummary(raw,matchedItems));
    } else {
      _chatAddMsg(raw);
    }
  } else {
    _chatAddMsg("I understand your question, but dashboard query support has not been implemented yet.");
  }
  msgs.scrollTop=msgs.scrollHeight;
};

// Check chat access after render
var _origRender=window.render;
window.render=function(){if(_origRender)_origRender.apply(this,arguments);_chatCheckAccess();};
