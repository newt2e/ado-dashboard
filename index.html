<script>
window.DashboardAdapter = {
  snapshot: function() {
    var items = effectiveItems();
    var closed = items.filter(function(i){ return i.state === 'Closed'; });
    var overdueItems = items.filter(function(i){ return urgency(i) === 'overdue'; });
    var thisWeek = items.filter(function(i){ return urgency(i) === 'thisweek'; });
    var inProgress = items.filter(function(i){ return i.state === 'In Progress' || i.state === 'Active'; });
    var t = items.length;
    var wsMap = {};
    items.forEach(function(i){
      if(!wsMap[i.ws]) wsMap[i.ws] = {id:i.ws, name:(WS_META[i.ws]&&WS_META[i.ws].name)||i.ws, items:[], closed:0, overdue:0};
      wsMap[i.ws].items.push(i);
      if(i.state==='Closed') wsMap[i.ws].closed++;
      if(urgency(i)==='overdue') wsMap[i.ws].overdue++;
    });
    return {
      asOf:        G.lastSync,
      currentUser: G.currentUser,
      completion:  { total:t, closed:closed.length, pct: t ? Math.round(closed.length/t*100) : 0 },
      overdue:     overdueItems.map(function(i){ return {id:i.id,title:i.title,owner:i.owner,ws:i.ws,target:i.target}; }),
      thisWeek:    thisWeek.map(function(i){ return {id:i.id,title:i.title,owner:i.owner,ws:i.ws,target:i.target}; }),
      inProgress:  inProgress.map(function(i){ return {id:i.id,title:i.title,owner:i.owner,ws:i.ws}; }),
      workstreams: Object.values(wsMap).map(function(w){ return {id:w.id,name:w.name,total:w.items.length,closed:w.closed,overdue:w.overdue,pct:w.items.length?Math.round(w.closed/w.items.length*100):0}; })
    };
  }
};
</script>
<script>
window.DashboardSearch = function(query) {
  if(!query || !window.DashboardAdapter) return null;
  var q = query.toLowerCase().trim();
  var items = effectiveItems();

  // Search across all fields
  var results = items.filter(function(i) {
    return (i.title  && i.title.toLowerCase().indexOf(q)  !== -1) ||
           (i.owner  && i.owner.toLowerCase().indexOf(q)  !== -1) ||
           (i.state  && i.state.toLowerCase().indexOf(q)  !== -1) ||
           (i.ws     && i.ws.toLowerCase().indexOf(q)     !== -1) ||
           (i.type   && i.type.toLowerCase().indexOf(q)   !== -1) ||
           (i.target && i.target.indexOf(q)               !== -1) ||
           (String(i.id).indexOf(q)                       !== -1) ||
           (WS_META[i.ws] && WS_META[i.ws].name && WS_META[i.ws].name.toLowerCase().indexOf(q) !== -1);
  });

  if(!results.length) return 'No items matched "' + query + '". Try searching by owner name, workstream, or state.';

  var closed  = results.filter(function(i){ return i.state === 'Closed'; }).length;
  var inprog  = results.filter(function(i){ return i.state === 'In Progress' || i.state === 'Active'; }).length;
  var overdue = results.filter(function(i){ return urgency(i) === 'overdue'; }).length;
  var pct     = Math.round(closed/results.length*100);
  var summary = results.length + ' item' + (results.length>1?'s':'') + ' matched "' + query + '":\n'
    + '  • ' + pct + '% complete (' + closed + ' closed)'
    + (inprog ? ', ' + inprog + ' in progress' : '')
    + (overdue ? ', ⚠ ' + overdue + ' overdue' : '') + '.';
  var top = results.slice(0,5).map(function(i){
    var flag = urgency(i)==='overdue' ? ' ⚠' : i.state==='Closed' ? ' ✓' : '';
    return '  ' + i.title + ' (' + i.owner + ', ' + (i.target||'no date') + ')' + flag;
  });
  var more = results.length > 5 ? '  ...and ' + (results.length-5) + ' more items.' : '';
  return summary + '\n' + top.join('\n') + (more ? '\n'+more : '');
};
</script>
<script>
window.DashboardSearchExtract = function(question) {
  var q = question.toLowerCase();
  var items = effectiveItems();

  // Extract owner name
  var owner = null;
  Object.keys(OWNER_META).forEach(function(name) {
    if(q.indexOf(name.toLowerCase()) !== -1) owner = name;
  });

  // Extract workstream (WSx or name)
  var ws = null;
  Object.keys(WS_META).forEach(function(k) {
    if(q.indexOf(k.toLowerCase()) !== -1) ws = k;
    if(WS_META[k].name && q.indexOf(WS_META[k].name.toLowerCase()) !== -1) ws = k;
  });

  // Extract date — looks for month name + day number
  var dateStr = null;
  var months = {january:0,february:1,march:2,april:3,may:4,june:5,july:6,august:7,september:8,october:9,november:10,december:11,
                jan:0,feb:1,mar:2,apr:3,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  Object.keys(months).forEach(function(m) {
    var idx = q.indexOf(m);
    if(idx === -1) return;
    var dayMatch = q.slice(idx).match(/\b(\d{1,2})(st|nd|rd|th)?\b/);
    if(dayMatch) {
      var day = parseInt(dayMatch[1]);
      var year = new Date().getFullYear();
      var d = new Date(year, months[m], day);
      dateStr = d.toISOString().slice(0, 10);
    }
  });

  // State keywords
  var stateFilter = null;
  if(q.indexOf('complet') !== -1 || q.indexOf('closed') !== -1 || q.indexOf('done') !== -1) stateFilter = 'Closed';
  else if(q.indexOf('in progress') !== -1 || q.indexOf('active') !== -1) stateFilter = 'In Progress';
  else if(q.indexOf('not started') !== -1 || q.indexOf('yet to start') !== -1) stateFilter = 'Yet to Start';
  else if(q.indexOf('new') !== -1) stateFilter = 'New';

  // Time keywords — next week, this week, overdue
  var timeFilter = null;
  if(q.indexOf('next week') !== -1) timeFilter = 'nextweek';
  else if(q.indexOf('this week') !== -1 || q.indexOf('due soon') !== -1) timeFilter = 'thisweek';
  else if(q.indexOf('overdue') !== -1 || q.indexOf('late') !== -1 || q.indexOf('behind') !== -1) timeFilter = 'overdue';

  // No entity found — fall through to plain search
  if(!owner && !ws && !dateStr && !timeFilter && !stateFilter) return null;

  // Filter items
  var results = items.filter(function(i) {
    if(owner && i.owner !== owner) return false;
    if(ws && i.ws !== ws) return false;
    if(dateStr && i.target !== dateStr) return false;
    if(stateFilter && i.state !== stateFilter) return false;
    if(timeFilter === 'overdue' && urgency(i) !== 'overdue') return false;
    if(timeFilter === 'thisweek' && urgency(i) !== 'thisweek') return false;
    if(timeFilter === 'nextweek' && urgency(i) !== 'nextweek') return false;
    return true;
  });

  if(!results.length){
    var who = owner ? owner : ws ? (WS_META[ws]?WS_META[ws].name:ws) : dateStr;
    return 'No items found for ' + who + '. They may have no assigned work, or data may need a sync.';
  }

  var closed  = results.filter(function(i){ return i.state==='Closed'; }).length;
  var inprog  = results.filter(function(i){ return i.state==='In Progress'||i.state==='Active'; }).length;
  var overdue = results.filter(function(i){ return urgency(i)==='overdue'; }).length;
  var pct     = Math.round(closed/results.length*100);
  var label   = owner ? owner+"'s work"
    : ws ? (WS_META[ws]?WS_META[ws].name:ws)
    : timeFilter === 'nextweek' ? 'Due next week'
    : timeFilter === 'thisweek' ? 'Due this week'
    : timeFilter === 'overdue'  ? 'Overdue items'
    : stateFilter ? stateFilter + ' items'
    : 'Items on '+dateStr;
  var summary = label + ' — ' + results.length + ' item' + (results.length>1?'s':'') + ':\n'
    + '  • ' + pct + '% complete (' + closed + ' closed)'
    + (inprog ? ', ' + inprog + ' in progress' : '')
    + (overdue ? ', ⚠ ' + overdue + ' overdue' : '') + '.';
  var top = results.slice(0,5).map(function(i){
    var flag = urgency(i)==='overdue' ? ' ⚠' : i.state==='Closed' ? ' ✓' : '';
    return '  ' + i.title + ' (' + (i.target||'no date') + ', ' + i.state + ')' + flag;
  });
  var more = results.length > 5 ? '  ...and ' + (results.length-5) + ' more.' : '';
  return summary + '\n' + top.join('\n') + (more ? '\n'+more : '');
};
</script>
